<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family:'Segoe UI',Arial,sans-serif; background:#ECE5DD; min-height:100vh; display:flex; flex-direction:column; max-width:480px; margin:0 auto; }
    .header { background:#075E54; color:white; padding:10px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
    .avatar { width:42px; height:42px; background:#25D366; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .header h1 { font-size:16px; font-weight:600; }
    .header p  { font-size:12px; opacity:.75; margin-top:1px; }
    .prog-wrap { background:#054c44; height:4px; }
    .prog-bar  { height:100%; background:#25D366; transition:width .6s ease; width:0; }
    .chat { flex:1; overflow-y:auto; padding:14px 12px 10px; display:flex; flex-direction:column; gap:6px; }
    .bubble { max-width:84%; padding:9px 13px; border-radius:8px; font-size:14px; line-height:1.6; word-wrap:break-word; animation:pop .2s ease; }
    @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .bubble-bot  { background:white; border-top-left-radius:0; align-self:flex-start; box-shadow:0 1px 2px rgba(0,0,0,.1); }
    .bubble-user { background:#DCF8C6; border-top-right-radius:0; align-self:flex-end; box-shadow:0 1px 2px rgba(0,0,0,.1); }
    .dots{display:flex;gap:5px;align-items:center;padding:3px 2px}
    .dots span{width:8px;height:8px;background:#bbb;border-radius:50%;animation:bounce 1.1s infinite}
    .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:none}30%{transform:translateY(-6px)}}
    .spin{width:16px;height:16px;border:2.5px solid #d9d9d9;border-top-color:#075E54;border-radius:50%;display:inline-block;animation:rot .7s linear infinite;flex-shrink:0}
    @keyframes rot{to{transform:rotate(360deg)}}
    .choices{display:flex;flex-wrap:wrap;gap:8px;padding:6px 12px 10px;justify-content:center}
    .choice-btn{border:1.5px solid #25D366;background:white;color:#075E54;padding:8px 18px;border-radius:20px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s}
    .choice-btn:hover,.choice-btn:active{background:#25D366;color:white}
    .choice-btn.primary{background:#075E54;color:white;font-size:14px;padding:12px 26px;border-color:#075E54}
    .choice-btn.primary:hover{background:#054c44}
    .input-row{background:#F0F0F0;padding:8px 10px;display:flex;gap:8px;align-items:flex-end}
    .chat-input{flex:1;border:none;border-radius:20px;padding:10px 16px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:130px}
    .send-btn{width:44px;height:44px;background:#25D366;border:none;border-radius:50%;color:white;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .send-btn:hover{background:#128C7E}
    .hidden{display:none!important}
    body.rtl{direction:rtl}
    body.rtl .bubble-bot{border-top-left-radius:8px;border-top-right-radius:0}
    body.rtl .bubble-user{border-top-right-radius:8px;border-top-left-radius:0}
    body.rtl .chat-input{text-align:right}
    /* CV Overlay */
    #cv-overlay{display:none;position:fixed;inset:0;background:white;z-index:1000;flex-direction:column}
    #cv-overlay.open{display:flex}
    #cv-toolbar{background:#075E54;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
    #cv-toolbar button{background:none;border:none;color:white;cursor:pointer;font-family:inherit;font-size:13px}
    #cv-toolbar .back-btn{font-size:22px;line-height:1;padding:0 4px}
    #cv-toolbar .title{font-size:15px;font-weight:600;flex:1;text-align:center}
    #cv-toolbar .save-btn{background:#25D366;padding:7px 14px;border-radius:16px;font-weight:600;white-space:nowrap}
    #cv-toolbar .save-btn:hover{background:#1ea855}
    #cv-scroll{flex:1;overflow-y:auto;background:#f4f4f4}
    #cv-rendered{background:white;max-width:800px;margin:16px auto;box-shadow:0 2px 8px rgba(0,0,0,.12)}
    #cv-footer{background:#f0f0f0;padding:12px 16px;text-align:center;flex-shrink:0;border-top:1px solid #ddd}
    #cv-footer .save-main{background:#075E54;color:white;border:none;border-radius:8px;padding:13px 32px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
    #cv-footer .save-main:hover{background:#054c44}
    #cv-footer .edit-main{background:#fff;color:#075E54;border:1.5px solid #075E54;border-radius:8px;padding:12px 32px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-bottom:8px}
    #cv-footer .edit-main:hover{background:#eef4ff}
    #cv-footer .print-hint{font-size:11px;color:#777;margin-top:8px;line-height:1.5}
    /* Edit form overlay */
    #edit-overlay{display:none;position:fixed;inset:0;background:#f4f4f4;z-index:1500;flex-direction:column}
    #edit-overlay.open{display:flex}
    #edit-bar{background:#075E54;color:#fff;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    #edit-bar .title{font-size:15px;font-weight:600}
    #edit-bar button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;font-family:inherit;line-height:1}
    #edit-body{flex:1;overflow-y:auto;padding:14px}
    .ef-group{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .ef-group h4{margin:0 0 10px;font-size:12px;color:#075E54;text-transform:uppercase;letter-spacing:.6px}
    .ef-field{margin-bottom:10px}
    .ef-field label{display:block;font-size:12px;color:#555;margin-bottom:4px}
    .ef-field input,.ef-field textarea{width:100%;border:1px solid #ccc;border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none}
    .ef-field input:focus,.ef-field textarea:focus{border-color:#25D366}
    .ef-field textarea{resize:vertical;min-height:70px}
    .ef-job{border:1px solid #e0e0e0;border-radius:10px;padding:12px 12px 4px;margin-bottom:10px;position:relative;background:#fafafa}
    .ef-job .rm{position:absolute;top:8px;inset-inline-end:8px;background:#fdecea;color:#c0392b;border:none;border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;font-family:inherit}
    .ef-row{display:flex;gap:8px}
    .ef-row .ef-field{flex:1}
    .ef-add{background:#eef4ff;border:1px dashed #1A3A5C;color:#1A3A5C;border-radius:8px;padding:10px;width:100%;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
    #edit-foot{background:#fff;padding:12px;flex-shrink:0;border-top:1px solid #ddd;display:flex;gap:10px}
    #edit-foot button{flex:1;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    #edit-foot .cancel{background:#eee;color:#444}
    #edit-foot .apply{background:#075E54;color:#fff}
    #edit-foot .apply:disabled{opacity:.6;cursor:default}
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar">📄</div>
    <div><h1 id="hdr-title">CV Builder</h1><p id="hdr-sub">Free · Professional · ATS-Ready</p></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="pbar"></div></div>
  <div class="chat" id="chat"></div>
  <div class="choices hidden" id="choices"></div>
  <div class="input-row" id="input-row">
    <textarea class="chat-input" id="inp" rows="1" placeholder="Type here…" onkeydown="onKey(event)"></textarea>
    <button class="send-btn" onclick="send()">&#9658;</button>
  </div>
  <div id="cv-overlay">
    <div id="cv-toolbar">
      <button class="back-btn" onclick="closeCV()">&#8592;</button>
      <span class="title" id="cv-toolbar-title">Your CV</span>
      <button class="save-btn" onclick="savePDF()">💾 Save PDF</button>
    </div>
    <div id="cv-scroll"><div id="cv-rendered"></div></div>
    <div id="cv-footer">
      <button class="edit-main" id="cv-edit-btn" onclick="openEditForm()">✏️ Edit details</button>
      <button class="save-main" onclick="savePDF()">💾 Save as PDF</button>
      <p class="print-hint" id="cv-footer-hint">Downloads a real PDF with selectable, <strong>ATS-readable</strong> text.</p>
    </div>
  </div>
  <input type="file" id="cv-file" accept=".pdf,.png,.jpg,.jpeg,.webp,image/*" style="display:none">
  <div id="edit-overlay">
    <div id="edit-bar">
      <span class="title" id="edit-title">Edit your CV</span>
      <button onclick="closeEdit()">&#10005;</button>
    </div>
    <div id="edit-body"></div>
    <div id="edit-foot">
      <button class="cancel" id="edit-cancel" onclick="closeEdit()">Cancel</button>
      <button class="apply" id="edit-apply" onclick="applyEdit()">Apply changes</button>
    </div>
  </div>

function fmtPhone(p,code){
  if(!p)return'';
  // Already internationally formatted with human grouping (e.g. "+966 50 065 4259")?
  // Keep the candidate's own spacing — collapsing it hurts readability.
  if(/^\+\d[\d\s]{6,}$/.test(p.trim())&&/\s/.test(p.trim()))return p.trim().replace(/\s{2,}/g,' ');
  const codeDigits=(code||'').replace(/\D/g,'');
  let t=p.replace(/[^\d+]/g,'');
  if(t.startsWith('00'))t='+'+t.slice(2);            // international 00-prefix → +
  if(!t.startsWith('+')){
    const digits=t.replace(/\D/g,'');
    if(codeDigits&&digits.startsWith(codeDigits))t='+'+digits;        // already carries the country code
    else if(code)t=code+digits.replace(/^0+/,'');                     // local number → add code (drop trunk 0)
    else return p.trim();
  }
  // already has a country code embedded (e.g. 00966… / +966…) → never prepend it again
  if(codeDigits&&t.startsWith('+'+codeDigits))return '+'+codeDigits+' '+t.slice(1+codeDigits.length);
  return t;
}

function hasArabic(t){return /[؀-ۿ]/.test(t||'');}
// Persistent translation cache — avoids repeat API calls across builds and sessions
const TR_CACHE=(()=>{try{return JSON.parse(localStorage.getItem('cvb_tr')||'{}');}catch(e){return{};}})();
function trCacheSave(){try{localStorage.setItem('cvb_tr',JSON.stringify(TR_CACHE));}catch(e){}}
async function translateToEn(text){
  if(!text||!hasArabic(text))return text;          // already English / no Arabic → no network
  const q=text.trim();
  if(TR_CACHE[q]!==undefined)return TR_CACHE[q];    // cache hit → no network
  let out=null;
  // 1) Google (unofficial) — best quality
  try{
    const r=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=ar&tl=en&dt=t&q='+encodeURIComponent(q));
    if(r.ok){
      const data=await r.json();
      if(Array.isArray(data)&&Array.isArray(data[0])){
        const g=data[0].map(seg=>seg&&seg[0]?seg[0]:'').join('').trim();
        if(g)out=g;
      }
    }
  }catch(e){}
  // 2) MyMemory — CORS-friendly fallback
  if(!out){
    try{
      const r=await fetch('https://api.mymemory.translated.net/get?langpair=ar|en&q='+encodeURIComponent(q));
      if(r.ok){
        const data=await r.json();
        const m=data&&data.responseData&&data.responseData.translatedText;
        if(m&&m.trim()&&!/MYMEMORY WARNING|QUERY LENGTH LIMIT/i.test(m))out=m.trim();
      }
    }catch(e){}
  }
  if(out){TR_CACHE[q]=out;trCacheSave();return out;}// cache only successful translations
  return text;                                      // both failed → keep original gracefully
}

async function translateCV(){

  cv.skills=await translateToEn(cv.skills);

    j.from=await translateToEn(j.from);
    j.to=await translateToEn(j.to);

  }
  // newly-captured sections + GCC identity fields
  if(cv.certifications)cv.certifications=await translateToEn(cv.certifications);
  if(cv.training)cv.training=await translateToEn(cv.training);
  if(cv.achievements)cv.achievements=await translateToEn(cv.achievements);

  for(const e of (cv.eduList||[])){

    e.inst=await translateToEn(e.inst);
  }
}

  const m=new Set(['a','an','the','and','but','or','for','nor','at','to','by','in','of','as']);
  return str.toLowerCase().split(/\s+/).map((w,i)=>{
    let r=(!m.has(w)||i===0)?w.charAt(0).toUpperCase()+w.slice(1):w;

// Title-case a phrase but PRESERVE tokens that are already meaningfully cased:
// ALL-CAPS acronyms (MATLAB, HYSYS, SQL), internal/Camel caps (LabVIEW, AutoCAD,
// PowerPoint) and tokens with digits (3D, S7). Stops enhancement from flattening
// real product/tech names into "Matlab", "Hysys", "Labview".
function smartCase(str){
  const minor=new Set(['a','an','the','and','but','or','nor','at','to','by','in','of','as','on','for','vs']);
  return (str||'').split(/\s+/).map((w,i)=>{
    const core=w.replace(/[^A-Za-z0-9]/g,'');
    if(!core)return w;
    if(/^[A-Z0-9]+$/.test(core)&&core.length>=2)return w;          // MATLAB, HYSYS, SQL, 3D
    if(/[a-z]/.test(core)&&/[A-Z]/.test(core.slice(1)))return w;    // LabVIEW, AutoCAD, PowerPoint
    if(i>0&&minor.has(core.toLowerCase()))return w.toLowerCase();   // "…University of Beirut"
    // Title-case the first LETTER (not char 0 — so "(material" → "(Material"),
    // lowercasing the rest of that run; keep any trailing punctuation.
    return w.toLowerCase().replace(/[a-z]/,c=>c.toUpperCase());
  }).join(' ');
}

function fixSpell(str){
  let r=str;
  const keys=Object.keys(SPELL).sort((a,b)=>b.length-a.length);
  for(const k of keys){
    r=r.replace(new RegExp('\\b'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi'),m=>{

      if(m===m.toUpperCase())return v.toUpperCase();

  }
  return r;
}

function cleanTitle(raw){

    .replace(/\bsha3?warma\b/gi,'Shawarma')

    .replace(/\bsawaa2?\b|\bsawa2\b/gi,'Driver')
    .replace(/\bof phitigraphy\b|\bof photigraphy\b|\bof photographi\b/gi,'of Photography');
  // Preserve embedded acronyms / codes (CHEN 201, IBDAA, CEO) via smartCase, but
  // normalise a fully SHOUTY title ("SENIOR SALES EXECUTIVE" → "Senior Sales …").
  const letters=t.replace(/[^A-Za-z]/g,'');

  const allShout=t.trim().split(/\s+/).length>=2&&letters.length>3&&letters===letters.toUpperCase();

}

/* Generic expander — makes ANY typed duty detailed, even with no keyword match */
function capFirst(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return Math.abs(h);}
const PAST_IRR={make:'made',take:'took',drive:'drove',keep:'kept',sell:'sold',build:'built',lead:'led',run:'ran',do:'did',write:'wrote',send:'sent',deal:'dealt',meet:'met',hold:'held',pay:'paid',read:'read',leave:'left',speak:'spoke',oversee:'oversaw',draw:'drew',grow:'grew',win:'won',cost:'cost',hit:'hit',set:'set',cut:'cut',put:'put',get:'got',give:'gave',teach:'taught',buy:'bought',bring:'brought',find:'found',sweep:'swept',mean:'meant',wear:'wore',
  plan:'planned',stop:'stopped',ship:'shipped',chop:'chopped',mop:'mopped',scrub:'scrubbed',wrap:'wrapped',log:'logged',tag:'tagged',map:'mapped',grab:'grabbed',plot:'plotted',fit:'fitted'};
const BASE_VERBS=new Set('manage handle prepare cook clean serve sell drive deliver answer help assist organize arrange schedule train supervise lead coordinate maintain repair install build create design write edit film shoot photograph operate monitor track record enter process calculate count stock order purchase negotiate plan develop execute support resolve respond greet welcome check inspect test taste cut chop wash package load unload transport collect distribute file type print scan update review audit reconcile teach mentor guide run oversee direct control set fix replace paint weld wire bake grill fry mix measure weigh pack make take keep send meet hold pay clean cover lift carry stack sort label pack ring scan stamp sign draft compile gather'.split(' '));
const DUTY_GENERIC_VERBS=['Handled','Managed','Oversaw','Coordinated','Carried out'];
const DUTY_SUFFIX=[
  'ensuring consistent quality and full adherence to company standards',
  'maintaining a high level of accuracy, efficiency, and professionalism throughout',
  'contributing to smooth daily operations and the overall success of the team',
  'consistently meeting deadlines while exceeding performance expectations',
  'helping to maintain a positive, productive, and well-organized work environment',
  'delivering reliable results with strong attention to detail and care',
];
function pastTense(w){
  const lw=w.toLowerCase().replace(/[^a-z]/g,'');
  if(PAST_IRR[lw])return PAST_IRR[lw];
  if(/(ed|ing)$/.test(lw))return lw;
  if(/e$/.test(lw))return lw+'d';
  if(/[^aeiou]y$/.test(lw))return lw.slice(0,-1)+'ied';
  return lw+'ed';
}
function genericDuty(raw){
  // Non-English (e.g. Arabic) free text can't be translated offline — keep it as typed
  if(/[؀-ۿ]/.test(raw))return raw.trim().replace(/^[\-•*\s]+/,'').replace(/[.,؛\s]+$/,'');
  let t=fixSpell(raw.trim()).replace(/^[\-•*\s]+/,'').replace(/[.;,\s]+$/,'');
  if(!t)return'';
  const words=t.split(/\s+/);
  if(words.length>=12)return capFirst(t);            // already a full, detailed line
  const suf=DUTY_SUFFIX[hashStr(t)%DUTY_SUFFIX.length];
  const first=words[0].toLowerCase().replace(/[^a-z]/g,'');
  const rest=words.slice(1).join(' ');
  let body;
  if(BASE_VERBS.has(first)||/(ed|ing)$/.test(first)){
    body=capFirst(pastTense(words[0]))+(rest?' '+rest:'');
  }else{
    body=`${DUTY_GENERIC_VERBS[hashStr(t)%DUTY_GENERIC_VERBS.length]} ${t}`;
  }
  return `${body}, ${suf}`;
}
// Repair compound words split by a hyphen + space during PDF/OCR extraction:
// "Ni- based" → "Ni-based", "low- emission" → "low-emission", "real- world" →
// "real-world". Only joins when the part AFTER the hyphen is lowercase, so genuine
// date/range separators ("2026 – Present", "A – B") are left untouched.
function fixHyphenSpacing(s){
  return (s||'')
    .replace(/([A-Za-z0-9]{1,})\s*[\-–—]\s+([a-z]{2,})/g,'$1-$2')   // word- word → word-word
    .replace(/\s{2,}/g,' ');
}
function enhanceDuty(raw,preserve){
  if(!raw)return'';
  const fixed=fixHyphenSpacing(fixSpell(raw.trim()));
  // Uploaded CVs already contain the candidate's real, specific achievements
  // (often quantified). Preserve EVERY real bullet verbatim (spell-fixed +
  // capitalized) — never replace it with generic canned text or a keyword-matched
  // template, which would destroy the strongest content on the page.
  if(preserve){
    const clean=fixed.replace(/^[•\-\*▪◦·‣«»●0]+\s+(?=[A-Za-z])/,'').replace(/^[•\-\*▪◦·‣\s]+/,'').replace(/\s{2,}/g,' ').trim();
    if(clean.split(/\s+/).filter(Boolean).length>=2)return capFirst(clean);
    return'';                                         // drop stray single-word fragments
  }
  // From-scratch flow: typed input is terse, so expand it into a polished bullet.
  for(const[pat,exp]of DUTY_MAP){
    if(pat.test(fixed)||pat.test(raw))return exp;
  }
  return genericDuty(raw);                            // fallback now expands too
}

function enhanceSkill(raw){
  if(!raw)return'';
  const key=fixSpell(raw).toLowerCase().trim();
  if(SKILL_MAP[key])return SKILL_MAP[key];
  for(const[k,v]of Object.entries(SKILL_MAP)){if(key===k)return v;}   // exact map first
  if(key.split(/\s+/).length<=2)                                      // fuzzy only for terse from-scratch input
    for(const[k,v]of Object.entries(SKILL_MAP)){if(key.includes(k))return v;}
  return fixAcr(smartCase(fixSpell(raw.trim())));                     // preserve MATLAB/LabVIEW/AutoCAD casing
}
// Split a skills blob into category groups. Handles both a flat list ("Python, SQL,
// Excel") and the very common labelled form ("Programming & Modeling: MATLAB, Python
// | Tools: AutoCAD"). Each labelled line becomes its own group so the structure the
// candidate authored survives instead of being mashed into one comma run.
function parseSkillGroups(raw){
  const out=[];
  const add=(label,str)=>{
    const items=(str||'').split(/[,،;·•|]/).map(x=>x.replace(/[•▪◦·‣«»‹›]/g,' ').trim())
      .filter(Boolean).map(enhanceSkill).filter(x=>x&&x.replace(/[^A-Za-z0-9]/g,'').length>=2);
    if(items.length)out.push({label:label||'',items:[...new Set(items)]});
  };
  for(const line of (raw||'').split('\n').map(l=>l.trim()).filter(Boolean)){
    const m=line.match(/^([A-Za-z][A-Za-z &/]{1,30}?)\s*:\s*(.+)$/);
    if(m&&m[1].split(/\s+/).length<=4)add(fixAcr(tCase(m[1].trim())),m[2]);
    else add('',line);
  }
  return out;
}
// Parse a languages blob into [{name, level}], understanding the common forms:
// "English (Fluent), Arabic (Native)", "English - Fluent", and the prose style
// "Fluent in English and Arabic; elementary proficiency in French".
const LANG_LV_RE=/native|mother\s*tongue|fluent|fluency|advanced|proficient|proficiency|professional|upper[- ]?intermediate|intermediate|conversational|working|elementary|basic|beginner|limited|good|fair/i;
function normLangLevel(t){
  t=(t||'').toLowerCase();
  if(/native|mother/.test(t))return'Native';
  if(/fluent|fluency/.test(t))return'Fluent';
  if(/advanced|proficient|proficiency|professional/.test(t))return'Advanced';
  if(/upper|intermediate|conversational|working|good/.test(t))return'Intermediate';
  if(/element|basic|beginn|limited|fair/.test(t))return'Basic';
  return t?capFirst(t):'';
}
function parseLanguages(raw){
  if(!raw)return[];
  const out=[],seen=new Set();
  const push=(name,lvl)=>{name=tCase((name||'').trim());const k=name.toLowerCase();
    if(name&&name.length>=2&&!seen.has(k)&&!LANG_LV_RE.test(name)){seen.add(k);out.push({name,level:normLangLevel(lvl)});}};
  const clauses=raw.split(/[;\n،]+|,(?![^()]*\))/).map(c=>c.replace(/\s{2,}/g,' ').trim()).filter(Boolean);
  for(const c of clauses){
    const lv=(c.match(LANG_LV_RE)||[''])[0];
    const namesPart=c.replace(LANG_LV_RE,' ')
      .replace(/\b(in|proficiency|level|skills?|languages?|mother\s*tongue|of|with|a|an|the)\b/ig,' ')
      .replace(/[()\[\]:–—\-]/g,' ').replace(/\s{2,}/g,' ').trim();
    const names=namesPart.split(/\s+and\s+|\s*&\s*|\s*\/\s*/i).map(x=>x.trim()).filter(Boolean);
    (names.length?names:[namesPart]).forEach(n=>push(n,lv));
  }
  return out;
}

// Clean an uploaded profile/summary and return the candidate's OWN words —
// spell-fixed, de-spaced, sentence-terminated. We deliberately do NOT append
// canned marketing sentences ("proactive, solutions-focused mindset…"): uploaded
// summaries are usually self-written and strong, and templated filler only dilutes
// them and reads as AI-generated. Returns null if there isn't enough usable text,
// so the caller can fall back to a fully generated summary (from-scratch flow).
function enhanceSummary(raw){
  let base=fixAcr(capFirst(fixHyphenSpacing(fixSpell((raw||'').trim()))));
  base=base.replace(/\s+/g,' ').replace(/\s+([.,;:])/g,'$1').replace(/\s+$/,'').trim();
  if(base.replace(/\s/g,'').length<40)return null;
  if(!/[.!?]$/.test(base))base+='.';
  return base;
}

function pdfFilename(name){
  return name.trim().split(/\s+/).map(p=>p.charAt(0).toUpperCase()+p.slice(1).toLowerCase()).join('_')+'_CV';
}

const chatEl=()=>document.getElementById('chat');
const inpEl=()=>document.getElementById('inp');
const choicesEl=()=>document.getElementById('choices');
const inputRow=()=>document.getElementById('input-row');
function setProgress(p){document.getElementById('pbar').style.width=Math.min(100,p)+'%';}
function scrollDown(){const c=chatEl();c.scrollTop=c.scrollHeight;}
function fmt(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}

function botSay(text,fast){
  return new Promise(resolve=>{
    const typing=document.createElement('div');
    typing.className='bubble bubble-bot';
    typing.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
    chatEl().appendChild(typing);scrollDown();
    const d=fast?250:Math.min(1400,350+text.replace(/<[^>]+>/g,'').length*14);
    setTimeout(()=>{
      typing.remove();
      const b=document.createElement('div');
      b.className='bubble bubble-bot';b.innerHTML=fmt(text);
      chatEl().appendChild(b);scrollDown();resolve();
    },d);
  });
}
function userSay(text){
  const b=document.createElement('div');b.className='bubble bubble-user';b.textContent=text;
  chatEl().appendChild(b);scrollDown();
}
// Live loading bubble with a spinner; returns the element so the caller can remove it
function showLoader(text){
  const b=document.createElement('div');b.className='bubble bubble-bot';
  b.style.display='flex';b.style.alignItems='center';b.style.gap='9px';
  b.innerHTML='<span class="spin"></span><span>'+fmt(text)+'</span>';
  chatEl().appendChild(b);scrollDown();
  return b;
}

/* ══════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════ */
function ask(opts={}){
  return new Promise(resolve=>{
    choicesEl().innerHTML='';
    if(opts.choices){
      inputRow().classList.add('hidden');
      choicesEl().classList.remove('hidden');
      opts.choices.forEach(c=>{
        const btn=document.createElement('button');
        btn.className='choice-btn';btn.textContent=c;
        btn.onclick=()=>{choicesEl().classList.add('hidden');inputRow().classList.remove('hidden');userSay(c);resolve(c);};
        choicesEl().appendChild(btn);
      });
    } else {
      inpEl().rows=opts.multiline?4:1;
      inpEl().placeholder=s().ph;
      if(opts.optional){
        choicesEl().classList.remove('hidden');
        const skip=document.createElement('button');skip.className='choice-btn';skip.textContent=s().skip;
        skip.onclick=()=>{choicesEl().classList.add('hidden');userSay('—');resolver=null;inputLive=false;resolve('');};
        choicesEl().appendChild(skip);
      } else{choicesEl().classList.add('hidden');}
      inputRow().classList.remove('hidden');inpEl().focus();
      resolver=async val=>{
        if(!val&&!opts.optional){await botSay(s().err_empty,true);inpEl().focus();return;}
        if(opts.validate&&val){const e=opts.validate(val);if(e){await botSay(e,true);inpEl().focus();return;}}
        choicesEl().classList.add('hidden');inpEl().rows=1;
        userSay(val||'—');resolver=null;inputLive=false;resolve(val||'');
      };
      inputLive=true;
    }
  });
}
function send(){
  const val=inpEl().value.trim();inpEl().value='';
  if(inputLive&&resolver)resolver(val);
}
function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey&&inpEl().rows===1){e.preventDefault();send();}
}

/* ══════════════════════════════════════════════
   LANGUAGE FLOW  (fix #6)
══════════════════════════════════════════════ */
async function askLanguages(){
  const lvls=s().langLevels;
  // Map a chosen level (in any UI language) back to its English label for output
  const enLvl=l=>{const i=lvls.indexOf(l);return i>=0?T.en.langLevels[i]:l;};
  const result=[];

  // Arabic
  await botSay(s().q_ar);
  const hasAr=await ask({choices:s().yesNo});
  if(hasAr===s().yesNo[0]){
    await botSay(s().q_ar_lvl);
    const lvl=await ask({choices:lvls});
    result.push(`Arabic – ${enLvl(lvl)}`);
  }

  // English
  await botSay(s().q_en);
  const hasEn=await ask({choices:s().yesNo});
  if(hasEn===s().yesNo[0]){
    await botSay(s().q_en_lvl);
    const lvl=await ask({choices:lvls});
    result.push(`English – ${enLvl(lvl)}`);
  }

  // Other languages (loop)
  let more=true;
  while(more){
    await botSay(s().q_other);
    const ans=await ask({choices:[s().addLang,s().doneLang]});
    if(ans===s().doneLang){more=false;}
    else{
      await botSay(s().q_lang_name);
      const lname=await ask();
      await botSay(s().q_lang_lvl(tCase(lname)));
      const lvl=await ask({choices:lvls});
      const enName=tCase(await translateToEn(lname));
      result.push(`${enName} – ${enLvl(lvl)}`);
    }
  }

  return result.join(',  ');
}

async function run(){
  inputRow().classList.add('hidden');
  await botSay('👋 Welcome! | أهلاً وسهلاً',true);
  const pick=await ask({choices:['🇬🇧 English','🇦🇪 عربي']});
  lang=pick.includes('عربي')?'ar':'en';
  if(lang==='ar'){document.body.classList.add('rtl');document.documentElement.setAttribute('dir','rtl');document.documentElement.setAttribute('lang','ar');}
  document.getElementById('hdr-title').textContent=s().hTitle;
  document.getElementById('hdr-sub').textContent=s().hSub;

  await botSay(s().w1);await botSay(s().w2);await botSay(s().w3);

  // ── Step 1: upload an existing CV, or build from scratch ──
  await botSay(s().chooseStart);
  const start=await ask({choices:[s().optUpload,s().optScratch]});
  if(start===s().optUpload){await uploadFlow();return;}
  await scratchFlow();
}

async function scratchFlow(){
  cv._fromUpload=false;
  setProgress(5);  await botSay(s().q_name);  cv.name=await ask();
  setProgress(10); await botSay(s().q_title); cv.title=await ask();
  setProgress(15); await botSay(s().q_city);  cv.city=await ask();
  cv.city=await translateToEn(cv.city);          // translate now so country code can be detected
  cv.countryCode=detectCode(cv.city);

  // Relocation — ask, and if yes ask where
  await botSay(s().q_relocate);
  const reloc=await ask({choices:s().yesNo});
  if(reloc===s().yesNo[0]){
    cv.relocate=true;
    await botSay(s().q_relocate_where);
    cv.relocateWhere=await ask();
  } else {
    cv.relocate=false;cv.relocateWhere='';
  }

  // Email — optional (fix #2)
  setProgress(20); await botSay(s().q_email);
  cv.email=await ask({optional:true,validate:v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)?'':s().err_email});

  // Phone with country code hint (fix #5)
  setProgress(25); await botSay(s().q_phone(cv.countryCode));
  cv.phone=await ask();

  setProgress(30); await botSay(s().q_linkedin); cv.linkedin=await ask({optional:true});

  setProgress(35); await botSay(s().q_yrs);
  cv.yearsExp=await ask({choices:s().yrs});

  let jobCount=0,addMore=true;
  while(addMore&&jobCount<3){
    jobCount++;setProgress(35+jobCount*7);
    await botSay(s().q_jco(jobCount)); const jco=await ask();
    await botSay(s().q_jtl);          const jtl=await ask();
    await botSay(s().q_jfr);          const jfr=await ask();
    await botSay(s().q_jto);          const jto=await ask();
    await botSay(s().q_jdu);
    const raw=await ask({multiline:true});
    const duties=raw.split(/\n|,/).map(d=>d.trim()).filter(Boolean);
    cv.jobs.push({company:jco,title:jtl,from:jfr,to:jto,duties});
    if(jobCount<3){await botSay(s().q_more);const ans=await ask({choices:[s().yes,s().no]});addMore=(ans===s().yes);}
    else addMore=false;
  }

  // Education — new options + skip field if ≤ High School  (fix #3 & #4)
  setProgress(62); await botSay(s().q_edu);
  cv.eduLevel=await ask({choices:s().edu});

  const skipField=s().eduSkipField.has(cv.eduLevel);
  if(!skipField){
    setProgress(66); await botSay(s().q_fld); cv.eduField=await ask();
  } else {
    cv.eduField='';
  }
  setProgress(70); await botSay(s().q_ins); cv.eduInst=await ask();
  setProgress(74); await botSay(s().q_yr);
  cv.eduYear=await ask({validate:v=>/^\d{4}$/.test(v)?'':s().err_year});

  setProgress(80); await botSay(s().q_ski); cv.skills=await ask();

  // Language buttons (fix #6)
  setProgress(87); cv.langs=await askLanguages();

  setProgress(95);inputRow().classList.add('hidden');await botSay(s().q_gen);
  await botSay(s().consentMsg);
  await botSay(s().privacyNote(PRIVACY_EMAIL));
  choicesEl().innerHTML='';choicesEl().classList.remove('hidden');

  // Optional consent checkbox — storage happens only if ticked
  const cLabel=document.createElement('label');
  cLabel.style.cssText='display:flex;align-items:center;gap:9px;font-size:12.5px;color:#075E54;background:white;border:1.5px solid #25D366;border-radius:14px;padding:9px 14px;cursor:pointer;max-width:92%;line-height:1.4;';
  const cBox=document.createElement('input');
  cBox.type='checkbox';cBox.style.cssText='width:18px;height:18px;flex-shrink:0;accent-color:#075E54;cursor:pointer;';
  const cText=document.createElement('span');cText.innerHTML=fmt(s().consentLabel);
  cLabel.appendChild(cBox);cLabel.appendChild(cText);
  choicesEl().appendChild(cLabel);

  const genBtn=document.createElement('button');genBtn.className='choice-btn primary';genBtn.textContent=s().genBtn;
  genBtn.onclick=async()=>{
    if(!cBox.checked){await botSay(s().consentRequired,true);return;}  // consent is mandatory
    cv.consent=true;
    choicesEl().classList.add('hidden');userSay(s().genBtn);
    const loader=showLoader(s().translating);
    try{await translateCV();}finally{loader.remove();}   // save to DB happens on download
    showCV();
  };
  choicesEl().appendChild(genBtn);
}

/* ══════════════════════════════════════════════
   CV HTML BUILDER

// Builds the enhanced, English, structured CV data shared by the on-screen
// HTML preview (cvHTML) and the PDF generator (buildCvDoc). Output is ALWAYS
// English / LTR regardless of input language.
function cvData(){
  const E=T.en;

  const name=tCase(cv.name.trim());
  const title=cleanTitle(cv.title);
  const city=tCase(fixSpell(cv.city.trim()));
  const email=cv.email.trim().toLowerCase();
  const phone=fmtPhone(cv.phone,cv.countryCode);
  const linkedin=cv.linkedin.trim();
  const relocate=cv.relocate?E.relocateNote(cv.relocateWhere?tCase(fixSpell(cv.relocateWhere.trim())):''):'';

  const skillGroups=parseSkillGroups(cv.skills);
  const skills=skillGroups.flatMap(g=>g.items);   // flat list (summary template + tag fallback)

  const jobs=cv.jobs.map(j=>({
    company:cleanCompany(j.company),
    title:cleanTitle(j.title),
    from:tCase(j.from.trim()),
    to:tCase(fixSpell(j.to.trim())),
    duties:j.duties.map(d=>enhanceDuty(d,cv._fromUpload)).filter(Boolean),
  }));

  // Education — support multiple entries; hide field when redundant with level
  const fmtEdu=(level,field,inst,year)=>{
    const i=s().edu.indexOf(level);
    const lv=fixAcr(smartCase(i>=0?E.edu[i]:(level||'')));   // keep MSc/BSc/MBA/PhD casing
    const fd=field?fixAcr(tCase(fixSpell(field.trim()))):'';
    const showField=!!fd&&fd.toLowerCase()!=='high school'&&fd.toLowerCase()!=='highschool'&&fd.toLowerCase()!==lv.toLowerCase();
    return{level:lv,field:fd,inst:fixAcr(smartCase(fixSpell((inst||'').trim()))),year:(year||'').trim(),showField};
  };
  let eduList=((cv.eduList&&cv.eduList.length)?cv.eduList.map(e=>fmtEdu(e.level,e.field,e.inst,e.year))
    :[fmtEdu(cv.eduLevel,cv.eduField,cv.eduInst,cv.eduYear)]).filter(e=>e.level||e.inst||e.field);
  const edu=eduList[0]||{level:'',field:'',inst:'',year:'',showField:false};

  // Newly-captured sections (preserve the candidate's real content; clean only).
  // Drop fragments with fewer than 3 letters (stray numbers/symbols from banners).
  const keepItem=x=>x&&x.replace(/[^A-Za-z]/g,'').length>=3;
  const splitLines=v=>(v||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const certifications=splitLines(cv.certifications).map(x=>fixAcr(capFirst(fixSpell(x)))).filter(keepItem);
  const training=splitLines(cv.training).map(x=>fixAcr(capFirst(fixSpell(x)))).filter(keepItem);
  const achievements=splitLines(cv.achievements).map(x=>capFirst(fixSpell(x))).filter(keepItem);
  const volunteer=splitLines(cv.volunteer).map(x=>capFirst(fixSpell(x))).filter(keepItem);

  // GCC identity (nationality + visa only) and a second phone if present
  const nationality=cv.nationality?tCase(fixSpell(cv.nationality.trim())):'';
  const visa=cv.visa?fixAcr(capFirst(fixSpell(cv.visa.trim()))):'';
  const phone2=fmtPhone(cv.phone2,cv.countryCode);

  // Languages → [{name, level}] — handles "Name (Level)", "Name - Level" and prose
  // ("Fluent in English and Arabic; elementary proficiency in French").
  const langs=parseLanguages(cv.langs);

  // Summary — for uploads keep the candidate's own words (cleaned, no filler);
  // for the from-scratch flow generate a polished template.
  const yrsIdx=s().yrs.indexOf(cv.yearsExp);
  const yrsEn=yrsIdx>=0?E.yrs[yrsIdx]:cv.yearsExp;
  const ownSummary=(cv.summary||'').trim();
  const enhanced=(cv._fromUpload&&ownSummary.length>=40)?enhanceSummary(ownSummary):null;
  const summary=enhanced||E.sumTpl(title,yrsEn,jobs.length?jobs[0].company:'',skills);

  return {name,title,city,email,phone,phone2,linkedin,relocate,nationality,visa,
    skills,skillGroups,jobs,edu,eduList,langs,summary,
    certifications,training,achievements,volunteer,
    labels:{sum:E.secSum,exp:E.secExp,edu:E.secEdu,ski:E.secSki,lng:E.secLng,
      cert:E.secCert,train:E.secTrain,ach:E.secAch,vol:E.secVol}};
}

function cvHTML(){
  const E=T.en;
  const isAr=false;
  const dir='ltr';
  const al='left';
  const pl='padding-left';

  const d=cvData();
  const {name,title,city,email,phone,phone2,linkedin,relocate,nationality,visa,skills,skillGroups,jobs,langs:langList,summary,
    certifications,training,achievements,volunteer,eduList}=d;

  /* ── Vibrant palette + inline SVG icons (no emoji) ── */
  const BLUE='#2563EB', DARK='#111827', MUTED='#6B7280', BODY='#374151';
  const icon=(p,sz)=>`<svg width="${sz||12}" height="${sz||12}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0;">${p}</svg>`;
  const I_PHONE='<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>';
  const I_MAIL='<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/>';
  const I_PIN='<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>';
  const I_LINK='<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>';
  const I_CAL='<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>';
  const I_PLANE='<path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>';

  const contactItem=(ic,txt)=>`<span style="display:inline-flex;align-items:center;gap:5px;color:${BODY};"><span style="color:${BLUE};display:inline-flex;">${icon(ic,13)}</span>${txt}</span>`;
  const contacts=[
    phone&&contactItem(I_PHONE,phone),
    phone2&&contactItem(I_PHONE,phone2),
    email&&contactItem(I_MAIL,email),
    city&&contactItem(I_PIN,city),
    linkedin&&contactItem(I_LINK,linkedin),
  ].filter(Boolean).join('');
  const metaItems=[nationality&&('Nationality: '+nationality),visa].filter(Boolean).join('  ·  ');

  const sec=t=>`<div style="font-size:12px;font-weight:bold;color:${DARK};text-transform:uppercase;letter-spacing:1.3px;border-bottom:2px solid ${BLUE};padding-bottom:5px;margin:0 0 12px;">${t}</div>`;
  const listSec=(label,arr)=>(arr&&arr.length)?`<div style="margin-bottom:16px;">${sec(label)}<ul style="padding-left:17px;margin:0;font-size:11.5px;color:${BODY};line-height:1.5;">${arr.map(x=>`<li style="margin-bottom:4px;">${x}</li>`).join('')}</ul></div>`:'';

  const jobsHTML=jobs.map(j=>{
    const bullets=j.duties.map(d=>`<li style="margin-bottom:4px;">${d}</li>`).join('');
    const dates=[j.from,j.to].filter(Boolean).join(' – ');
    return `<div style="margin-bottom:15px;">
      <div style="font-weight:bold;font-size:13.5px;color:${DARK};">${j.title}</div>
      ${j.company?`<div style="font-size:12.5px;color:${BLUE};font-weight:bold;margin-top:1px;">${j.company}</div>`:''}
      ${dates?`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:${MUTED};margin:3px 0 5px;"><span style="color:${BLUE};display:inline-flex;">${icon(I_CAL,12)}</span>${dates}</div>`:''}
      ${bullets?`<ul style="padding-left:17px;margin:0;font-size:12px;color:${BODY};line-height:1.55;">${bullets}</ul>`:''}
    </div>`;
  }).join('');

  const tag=sk=>`<span style="background:#EFF4FE;border:1px solid #BFD4F5;color:#1E40AF;padding:4px 10px;border-radius:13px;font-size:11px;margin:0 5px 6px 0;display:inline-block;">${sk}</span>`;
  // Labelled categories → "Label: a · b · c" lines (keeps the candidate's structure);
  // a single unlabelled group → pill tags as before.
  const hasCats=(skillGroups||[]).some(g=>g.label);
  const skillTags=hasCats
    ? skillGroups.map(g=>g.label
        ? `<div style="font-size:11.5px;color:${BODY};line-height:1.55;margin-bottom:5px;"><strong style="color:${DARK};">${g.label}:</strong> ${g.items.join(' · ')}</div>`
        : `<div style="margin-bottom:4px;">${g.items.map(tag).join('')}</div>`).join('')
    : skills.map(tag).join('');

  /* ── Languages → name + proficiency dots ── */
  const langDotCount=t=>{
    t=(t||'').toLowerCase();
    if(/native|mother|fluent|طليق|طلاقة|اللغة الأم/.test(t))return 5;
    if(/advanced|proficient|upper/.test(t))return 4;
    if(/basic|beginn|element|limited|fair|مبتدئ/.test(t))return 2;
    return 3; // intermediate / good / working / default
  };
  const langHTML=langList.map(l=>{
    const n=langDotCount(l.level);
    let dots='';
    for(let i=0;i<5;i++)dots+=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${i<n?BLUE:'#D9DEE8'};margin-left:3px;"></span>`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
      <div><div style="font-size:12px;font-weight:bold;color:${DARK};">${l.name}</div>${l.level?`<div style="font-size:10.5px;color:${MUTED};">${l.level}</div>`:''}</div>
      <div style="white-space:nowrap;display:flex;">${dots}</div>
    </div>`;
  }).join('');

  const eduHTML=eduList.map(e=>`<div style="margin-bottom:9px;">
    <div style="font-weight:bold;font-size:13px;color:${DARK};">${e.level}${e.showField?' – '+e.field:''}</div>
    <div style="font-size:11.5px;color:${MUTED};margin-top:2px;">${e.inst}${e.year?'  ·  '+e.year:''}</div>
  </div>`).join('');

  /* ── Two columns: Experience+Achievements+Education+Volunteer (main) |
        Summary+Skills+Certifications+Training+Languages (sidebar) ── */
  const mainCol=`${jobs.length?sec(E.secExp)+jobsHTML:''}`+
    `${listSec(E.secAch,achievements)}`+
    `${eduHTML?sec(E.secEdu)+eduHTML:''}`+
    `${listSec(E.secVol,volunteer)}`;
  const sideCol=`${sec(E.secSum)}<p style="font-size:11.5px;color:${BODY};line-height:1.6;margin:0 0 16px;">${summary}</p>`+
    `${skills.length?`${sec(E.secSki)}<div style="margin-bottom:16px;">${skillTags}</div>`:''}`+
    `${listSec(E.secCert,certifications)}`+
    `${listSec(E.secTrain,training)}`+
    `${langHTML?`${sec(E.secLng)}${langHTML}`:''}`;

  return `<div style="font-family:'Inter','Segoe UI',Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;direction:ltr;text-align:left;color:${DARK};padding:38px 44px;line-height:1.55;background:white;">
    <div style="font-size:30px;font-weight:800;color:${DARK};letter-spacing:.5px;margin-bottom:3px;">${name}</div>
    ${title?`<div style="font-size:14.5px;color:${BLUE};font-weight:bold;margin-bottom:9px;">${title}</div>`:''}
    <div style="display:flex;flex-wrap:wrap;gap:4px 14px;align-items:center;font-size:11px;padding-bottom:12px;border-bottom:2px solid ${BLUE};">${contacts}</div>
    ${metaItems?`<div style="font-size:11px;color:${MUTED};margin-top:8px;">${metaItems}</div>`:''}
    ${relocate?`<div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${BLUE};font-weight:bold;margin-top:10px;"><span style="display:inline-flex;">${icon(I_PLANE,13)}</span>${relocate}</div>`:''}
    <div style="display:flex;gap:32px;margin-top:20px;align-items:flex-start;">
      <div style="flex:1.7;min-width:0;">${mainCol}</div>
      <div style="flex:1;min-width:0;">${sideCol}</div>
    </div>
  </div>`;
}

// pdfmake — lazy-loaded only when the user saves (same pattern as pdf.js upload)
const PDFMAKE_JS='https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.12/pdfmake.min.js';
const PDFMAKE_FONTS='https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.12/vfs_fonts.js';

// Build a real, text-based (selectable / ATS-readable) pdfmake document from the
// shared CV data. Single-column layout — the most ATS-safe structure.
function buildCvDoc(d){
  const BLUE='#2563EB', DARK='#111827', MUTED='#6B7280', BODY='#374151';
  const W=515; // A4 content width at 40pt margins (595 − 40 − 40)
  const rule=(c,lw)=>({canvas:[{type:'line',x1:0,y1:0,x2:W,y2:0,lineWidth:lw||1,lineColor:c||BLUE}]});
  const sectionHeader=label=>[
    {text:(label||'').toUpperCase(),bold:true,fontSize:11,color:DARK,characterSpacing:1,margin:[0,14,0,3]},
    {...rule(BLUE,1),margin:[0,0,0,7]}
  ];
  const L=d.labels;
  const c=[];

  // ── Header ──
  c.push({text:d.name,bold:true,fontSize:24,color:DARK,margin:[0,0,0,2]});
  if(d.title)c.push({text:d.title,bold:true,fontSize:12,color:BLUE,margin:[0,0,0,5]});
  const contacts=[d.phone,d.phone2,d.email,d.city,d.linkedin].filter(Boolean).join('   ·   ');
  if(contacts)c.push({text:contacts,fontSize:9,color:BODY,margin:[0,0,0,6]});
  c.push(rule(BLUE,1.5));
  const meta=[d.nationality&&('Nationality: '+d.nationality),d.visa].filter(Boolean).join('   ·   ');
  if(meta)c.push({text:meta,fontSize:9,color:MUTED,margin:[0,6,0,0]});
  if(d.relocate)c.push({text:d.relocate,bold:true,fontSize:9,color:BLUE,margin:[0,meta?2:7,0,0]});

  // ── Professional Summary ──
  c.push(...sectionHeader(L.sum));
  c.push({text:d.summary,fontSize:10,color:BODY,lineHeight:1.3});

  // ── Work Experience ──
  if(d.jobs.length){
    c.push(...sectionHeader(L.exp));
    d.jobs.forEach(j=>{
      c.push({text:j.title,bold:true,fontSize:11,color:DARK,margin:[0,5,0,0]});
      if(j.company)c.push({text:j.company,bold:true,fontSize:10,color:BLUE,margin:[0,1,0,0]});
      const dates=[j.from,j.to].filter(Boolean).join(' – ');
      if(dates)c.push({text:dates,fontSize:9,color:MUTED,margin:[0,1,0,3]});
      if(j.duties.length)c.push({ul:j.duties.slice(),fontSize:10,color:BODY,lineHeight:1.3,margin:[0,0,0,4]});
    });
  }

  // ── Skills (preserve "Category: items" structure when present) ──
  if(d.skills.length){
    c.push(...sectionHeader(L.ski));
    const groups=d.skillGroups||[];
    if(groups.some(g=>g.label)){
      groups.forEach(g=>{
        if(g.label)c.push({text:[{text:g.label+':  ',bold:true,color:DARK},{text:g.items.join(',   '),color:BODY}],fontSize:10,lineHeight:1.35,margin:[0,0,0,2]});
        else c.push({text:g.items.join(',   '),fontSize:10,color:BODY,lineHeight:1.35,margin:[0,0,0,2]});
      });
    }else{
      c.push({text:d.skills.join(',   '),fontSize:10,color:BODY,lineHeight:1.35});
    }
  }

  // ── Certifications ──
  if(d.certifications&&d.certifications.length){
    c.push(...sectionHeader(L.cert));
    c.push({ul:d.certifications.slice(),fontSize:10,color:BODY,lineHeight:1.3});
  }

  // ── Training & Courses ──
  if(d.training&&d.training.length){
    c.push(...sectionHeader(L.train));
    c.push({ul:d.training.slice(),fontSize:10,color:BODY,lineHeight:1.3});
  }

  // ── Achievements ──
  if(d.achievements&&d.achievements.length){
    c.push(...sectionHeader(L.ach));
    c.push({ul:d.achievements.slice(),fontSize:10,color:BODY,lineHeight:1.3});
  }

  // ── Education (one or more entries) ──
  if(d.eduList&&d.eduList.length){
    c.push(...sectionHeader(L.edu));
    d.eduList.forEach((e,i)=>{
      c.push({text:e.level+(e.showField?' – '+e.field:''),bold:true,fontSize:10.5,color:DARK,margin:[0,i?4:0,0,0]});
      const sub=[e.inst,e.year].filter(Boolean).join('  ·  ');
      if(sub)c.push({text:sub,fontSize:9.5,color:MUTED,margin:[0,1,0,0]});
    });
  }

  // ── Languages ──
  if(d.langs.length){
    c.push(...sectionHeader(L.lng));
    d.langs.forEach(l=>c.push({
      text:[{text:l.name,bold:true},l.level?{text:'  —  '+l.level,color:MUTED}:''],
      fontSize:10,color:DARK,margin:[0,1,0,0]
    }));
  }

  // ── Volunteer Experience ──
  if(d.volunteer&&d.volunteer.length){
    c.push(...sectionHeader(L.vol));
    c.push({ul:d.volunteer.slice(),fontSize:10,color:BODY,lineHeight:1.3});
  }

  return {
    pageSize:'A4',
    pageMargins:[40,40,40,40],
    defaultStyle:{font:'Roboto',fontSize:10,color:BODY,lineHeight:1.25},
    info:{title:pdfFilename(cv.name)},
    content:c
  };
}

// Generate and download a real PDF directly — no browser print dialog.
async function savePDF(){
  const st=s();
  const loader=showLoader(st.generating);
  try{
    await loadScript(PDFMAKE_JS);
    await loadScript(PDFMAKE_FONTS);
    pdfMake.createPdf(buildCvDoc(cvData())).download(pdfFilename(cv.name)+'.pdf');
    // Persist only when the user downloads the final version (consent required).
    // Save once (guarded by _matchSid); mark _saved only on success so a failed
    // save can retry on the next download. Show the CTA whenever we have an id.
    if(cv.consent){
      if(!cv._matchSid){

    }
  }catch(e){
    botSay(st.saveErr,true);
  }finally{
    loader.remove();
  }
}

/* ══════════════════════════════════════════════
   UPLOAD FLOW  →  read an existing CV, parse, enhance, draft
══════════════════════════════════════════════ */
// Lazy-load external libraries only when the upload feature is used
const _scriptCache={};
function loadScript(src){
  if(_scriptCache[src])return _scriptCache[src];
  _scriptCache[src]=new Promise((res,rej)=>{
    const el=document.createElement('script');el.src=src;
    el.onload=res;el.onerror=()=>rej(new Error('Failed to load '+src));
    document.head.appendChild(el);
  });
  return _scriptCache[src];
}

// Detect a two-column (sidebar) layout. Returns an array of item-groups in
// reading order (left column, then right). Single-column → one group. This stops
// sidebar CVs from interleaving the sidebar and the main column on the same line.
function detectColumns(items,pageW){
  if(items.length<16||!pageW)return[items];
  // Find a TRUE vertical gutter: a band of x where almost no item's horizontal
  // span lands. This distinguishes a real sidebar (clean empty channel running
  // down the page) from a single column that merely has right-aligned dates
  // (no empty channel — body prose still fills the middle). The old width-fraction
  // sweep mistook those dates for a column and scrambled single-column CVs.
  const BINS=120,binW=pageW/BINS,cover=new Array(BINS).fill(0);
  for(const it of items){
    const x0=Math.max(0,it.x),x1=Math.min(pageW,it.x+(it.w||0));
    const b0=Math.floor(x0/binW),b1=Math.floor(Math.max(x0,x1-1e-6)/binW);
    for(let b=b0;b<=b1&&b<BINS;b++)cover[b]++;
  }
  const emptyT=Math.max(1,items.length*0.012);
  let best=null,run=null;
  for(let b=0;b<=BINS;b++){
    if(b<BINS&&cover[b]<=emptyT){if(!run)run={s:b};run.e=b;}
    else if(run){
      const frac=((run.s+run.e)/2)/BINS,wBins=run.e-run.s+1;
      if(frac>=0.18&&frac<=0.66&&wBins>=2&&(!best||wBins>best.wBins))best={...run,wBins};
      run=null;
    }
  }
  if(!best)return[items];
  const bX=((best.s+best.e+1)/2)*binW;
  const left=items.filter(it=>(it.x+(it.w||0)/2)<bX);
  const right=items.filter(it=>(it.x+(it.w||0)/2)>=bX);
  // Validate that the SMALLER side is a genuine column — not just a strip of
  // right-aligned dates masquerading as one. A real sidebar carries varied prose
  // (emails, addresses, skills); a fake one is almost entirely date/number tokens.
  // So instead of a brittle "≥15% of all items" mass test (which wrongly rejected a
  // narrow but real sidebar whenever the main column was very dense), we require
  // both sides to span several lines AND the minority side to be mostly NON-dates.
  const linesOf=arr=>new Set(arr.map(it=>Math.round(it.y/6))).size;
  const linesText=arr=>{                         // group a column's items into line strings
    const srt=arr.slice().sort((a,b)=>b.y-a.y||a.x-b.x);const out=[];let cur=[],ly=null;
    for(const it of srt){if(ly!==null&&Math.abs(it.y-ly)>4){out.push(cur);cur=[];}cur.push(it);ly=it.y;}
    if(cur.length)out.push(cur);
    return out.map(l=>l.map(i=>i.s).join(' ').replace(/\s{2,}/g,' ').trim()).filter(Boolean);
  };
  const DATEISH=/^(?:(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec|present|current|till|to|now|since)[a-z]*\.?|[0-9]{1,4}|[–—\-\/.,&:]|st|nd|rd|th)$/i;
  const dateFrac=arr=>{const ls=linesText(arr);if(!ls.length)return 1;
    const d=ls.filter(s=>{const t=s.split(/\s+/).filter(Boolean);return t.length&&t.every(w=>DATEISH.test(w));}).length;
    return d/ls.length;};
  const minority=left.length<=right.length?left:right;
  if(linesOf(left)>=4&&linesOf(right)>=4&&minority.length>=8&&dateFrac(minority)<0.6)
    return[left,right];
  return[items];
}
// Join lines broken by a trailing hyphen. In designed/soft-wrapped CVs a line
// ending in "-" is almost always semantic — a compound word ("brand-\nconsistent")
// or a URL/slug wrapped across lines ("…/in/maria-el-\nchikhani-12345"). Keeping
// the hyphen and concatenating restores both, and removes stray fragment lines
// (e.g. a lone "consistent launches.") that otherwise confuse name detection.
function dehyphenate(text){
  const lines=text.split('\n');const out=[];
  for(let i=0;i<lines.length;i++){
    let l=lines[i];
    while(/[A-Za-z]-$/.test(l)&&i+1<lines.length)l=l+lines[++i].trim();
    out.push(l);
  }
  return out.join('\n');
}
// Group a set of positioned text items into lines (top→bottom, left→right).
function itemsToLines(items){
  if(!items.length)return'';
  const sorted=items.slice().sort((a,b)=>b.y-a.y);          // top first
  const lines=[];let cur=[],lastY=null;
  for(const it of sorted){
    if(lastY!==null&&Math.abs(it.y-lastY)>4){lines.push(cur);cur=[];}
    cur.push(it);lastY=it.y;
  }
  if(cur.length)lines.push(cur);
  return lines.map(ln=>ln.sort((a,b)=>a.x-b.x).map(i=>i.s).join(' ')
    .replace(/\s{2,}/g,' ').trim()).filter(Boolean).join('\n');
}
// PDF → text (pdf.js), column-aware so sidebar layouts don't scramble.
async function extractPDF(file){
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let out='';
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const pageW=page.getViewport({scale:1}).width;
    const tc=await page.getTextContent();
    const items=tc.items.filter(it=>it.str&&it.str.trim().length).map(it=>({
      x:it.transform[4],y:it.transform[5],w:it.width||0,s:it.str
    }));
    if(!items.length){out+='\n';continue;}
    const cols=detectColumns(items,pageW);
    cols.sort((a,b)=>b.length-a.length);         // main (larger) column first, so name/summary lead
    out+=cols.map(c=>dehyphenate(itemsToLines(c))).filter(Boolean).join('\n')+'\n';
  }
  return out;
}

// Image → text (Tesseract.js OCR, English + Arabic)
async function extractImage(file){
  await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
  const{data}=await Tesseract.recognize(file,'eng+ara');
  return (data&&data.text)||'';
}

// Flatten Tesseract's nested result (blocks→paragraphs→lines→words) into a flat
// list of words, each with its bounding box. Works across tesseract.js builds
// that expose either data.words directly or only data.blocks.
function ocrWords(data){
  if(!data)return[];
  if(Array.isArray(data.words)&&data.words.length)return data.words;
  const w=[];
  for(const b of (data.blocks||[]))
    for(const par of (b.paragraphs||[]))
      for(const ln of (par.lines||[]))
        for(const wd of (ln.words||[]))if(wd&&wd.text)w.push(wd);
  return w;
}
// Scanned / image-only PDF → render each page to a canvas and OCR it.
// CRITICAL: a flat dump of Tesseract's reading order interleaves the two columns
// of a sidebar CV (a phone number lands in the middle of a job bullet; "Skills"
// glues onto a sentence), which destroys the section structure the parser needs.
// So we OCR with word-level boxes, then rebuild the text COLUMN-AWARE using the
// exact same gutter detection + line grouping the embedded-text path uses.
async function extractPdfOCR(file){
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let out='';
  const maxPages=Math.min(pdf.numPages,5);
  for(let p=1;p<=maxPages;p++){
    const page=await pdf.getPage(p);
    const sc=2;                                    // render scale (canvas px = pt × sc)
    const vp=page.getViewport({scale:sc});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    const{data}=await Tesseract.recognize(canvas,'eng+ara');
    const words=ocrWords(data);
    if(words.length>=8){
      // Map OCR boxes (top-left origin, px) → the parser's coordinate space
      // (bottom-left origin, points) so detectColumns/itemsToLines just work.
      const items=words.filter(w=>w.text&&w.text.trim()&&w.bbox).map(w=>({
        x:w.bbox.x0/sc, y:(canvas.height-w.bbox.y0)/sc,
        w:(w.bbox.x1-w.bbox.x0)/sc, s:w.text
      }));
      const cols=detectColumns(items,vp.width/sc);
      cols.sort((a,b)=>b.length-a.length);         // main (larger) column first
      out+=cols.map(c=>dehyphenate(itemsToLines(c))).filter(Boolean).join('\n')+'\n';
    }else{
      out+=((data&&data.text)||'')+'\n';           // no geometry → raw text fallback
    }
  }
  return out;
}

async function handleFile(file){
  if(!file)return;
  cv._fromUpload=true;                 // preserve the candidate's own bullets / profile
  choicesEl().classList.add('hidden');
  userSay('📎 '+file.name);
  setProgress(20);
  const isPDF=/pdf/i.test(file.type)||/\.pdf$/i.test(file.name);
  const loader=showLoader(isPDF?s().reading:s().ocrReading);
  let text='';
  try{text=isPDF?await extractPDF(file):await extractImage(file);}catch(e){text='';}
  loader.remove();
  // Scanned / image-only PDF (no embedded text layer) → OCR the rendered pages
  if(isPDF&&text.replace(/\s/g,'').length<30){
    const lo=showLoader(s().ocrReading);
    try{text=await extractPdfOCR(file);}catch(e){}
    lo.remove();
  }

    await botSay(s().parseFail);uploadRetryButtons();return;
  }

    cv.eduLevel=await translateToEn(cv.eduLevel);
    cv.langs=await translateToEn(cv.langs);
  }finally{l2.remove();}
  await finalizeUpload();
}

// Best-effort parse of raw CV text into the cv structure
function parseCV(text){
  const clean=text.replace(/\r/g,'').replace(/ /g,' ');
  const lines=clean.split('\n').map(l=>l.trim()).filter(Boolean);
  cv.email=(clean.match(/[\w.+-]+@[\w-]+\.[\w.-]+/)||[''])[0];
  // Prefer phones that carry a country code / trunk prefix (avoids matching
  // year-ranges like "2003-2004"); fall back to a single broad match otherwise.
  const strictPh=(clean.match(/(?:\+|00)\d[\d\s().\-]{7,}\d|\b0\d[\d\s().\-]{8,}\d/g)||[]).map(p=>p.trim());
  const broadPh=(clean.match(/\+?\d[\d\s().\-]{7,}\d/g)||[]).map(p=>p.trim());
  const phAll=[...new Set(strictPh.length?strictPh:broadPh.slice(0,1))];
  cv.phone=phAll[0]||'';cv.phone2=phAll[1]||'';
  const li=clean.match(/(?:https?:\/\/)?(?:www\.)?linkedin\.com\/[^\s]+/i);cv.linkedin=li?li[0]:'';
  // nationality + visa/residency (GCC-relevant; DOB / marital status / age ignored)
  const nat=clean.match(/nationality\s*[:\-]?\s*([A-Za-z]+)/i)||clean.match(/\b([A-Z][a-z]+)\s+nationality\b/);
  cv.nationality=nat?tCase(nat[1].trim()):'';
  const visa=clean.match(/(?:non[-\s]?)?transferable\s+(?:rp|residence permit|iqama|visa)|residence permit|transferable\s+iqama|visa\s+status\s*[:\-]?\s*[A-Za-z ]{3,20}/i);
  cv.visa=visa?visa[0].replace(/\s{2,}/g,' ').trim():'';
  cv.name=guessName(lines);
  if(cv.name){const tb=titleAfterName(lines,cv.name);if(tb)cv.title=tb;}   // role line(s) under the name banner
  if(!cv.name)cv.name=nameFromContacts(cv.linkedin,cv.email);   // banner unreadable → derive it
  const secLines=splitGluedHeaders(lines);
  const sec=sliceSections(secLines);
  if(sec.skills.length){
    // Keep each line (categories like "Programming & Modeling: …" are real structure,
    // not noise) and pull a "Languages: …" line OUT to the languages field, where it
    // belongs — instead of mashing every line into one comma run. Also drop the
    // name/title and bare category labels that a sidebar layout can sweep in here.
    const nameLow=(cv.name||'').toLowerCase();
    const titleLows=new Set((cv.title||'').split(/[·|]/).map(x=>x.trim().toLowerCase()).filter(Boolean));
    const kept=[];
    for(const raw of sec.skills){
      const line=(raw||'').replace(/[•\*▪◦·‣«»‹›]/g,' ').replace(/(^|[\s,])\+(?=\s)/g,'$1 ').replace(/\s{2,}/g,' ').trim();
      if(!line)continue;
      const mLang=line.match(/^\s*(?:languages?|language skills|langues|اللغات)\s*[:\-]\s*(.+)$/i);
      if(mLang){if(!cv.langs)cv.langs=mLang[1].trim();continue;}
      const low=line.toLowerCase();
      if(low===nameLow||titleLows.has(low))continue;                       // name/title leaked from the header
      if(/^(soft|core|technical|key|other|hard|additional|general|computer|interpersonal)?\s*skills?$/i.test(low))continue;  // bare category divider
      kept.push(line);
    }
    // Stitch skill items wrapped across lines: a sidebar often breaks "Strategic
    // planning" or "Decision-making" mid-item, where the continuation starts
    // lower-case. Merge those before parseSkillGroups splits on commas.
    const merged=[];
    for(const l of kept){
      const prev=merged[merged.length-1];
      if(prev&&/^[a-z]/.test(l)&&!/[:]$/.test(prev))merged[merged.length-1]=prev.replace(/,\s*$/,'')+(/,\s*$/.test(prev)?', ':' ')+l;
      else merged.push(l);
    }
    cv.skills=merged.join('\n').trim();
  }
  if(sec.languages.length&&!cv.langs)cv.langs=pairLanguages(sec.languages);
  if(sec.education.length)parseEdu(sec.education);
  // Experience. Primary: the lines under an EXPERIENCE header. But designed CVs
  // often render that header as low-contrast art OCR can't read — so when the
  // section is empty, fall back to the "preamble" (everything before the first
  // recognized header, minus name/contact lines), which is where the jobs sit.
  let expLines=sec.experience;
  if(!expLines.length){
    const firstHdr=secLines.findIndex(isHeader);
    const pre=(firstHdr>0?secLines.slice(0,firstHdr):[]).filter(l=>
      l!==cv.name && !/@|linkedin\.com/i.test(l) && !(cv.phone&&l.includes(cv.phone)));
    expLines=pre;
  }
  let jobs=extractJobs(expLines);                       // date-anchored (normal CVs)
  if(!jobs.length)jobs=extractJobsLoose(expLines);      // dateless: anchor on "Company – Place" + bullets
  if(jobs.length)cv.jobs=jobs;
  // newly-captured sections (previously discarded)
  cv.certifications=bulletizeList(sec.certifications,true).join('\n');
  cv.training=bulletizeList(sec.training,true).join('\n');
  cv.achievements=bulletizeList(sec.achievements,false).join('\n');
  cv.volunteer=bulletizeList(sec.volunteer,false).join('\n');
  if(sec.summary.length){
    const sm=sec.summary.join(' ').replace(/[•\-\*▪◦·‣]/g,' ').replace(/\s{2,}/g,' ').trim();
    if(sm.length>=40)cv.summary=sm;          // keep the candidate's real profile text
  }
  // Many designed CVs print the profile paragraph right under the name with NO
  // "Summary" header. When we have a real experience section (so the preamble isn't
  // the jobs) and no summary yet, treat that leading prose block as the summary.
  if(!cv.summary&&sec.experience.length){
    const firstHdr=secLines.findIndex(isHeader);
    const pre=(firstHdr>0?secLines.slice(0,firstHdr):[]).filter(l=>
      l!==cv.name && l!==cv.title && !/@|linkedin\.com|^\+?\d/i.test(l) && !(cv.phone&&l.includes(cv.phone)) && !isHeader(l));
    const sm=pre.join(' ').replace(/\s{2,}/g,' ').trim();
    if(sm.length>=60)cv.summary=sm;
  }
  cv.city=guessCity(clean);
  cv.countryCode=resolveCountryCode(clean,cv.city);
  if(!cv.title)cv.title=(cv.jobs[0]&&cv.jobs[0].title)||guessTitle(lines,cv.name)||'';
}

// Languages in a sidebar are often STACKED — the language name on one line and its
// proficiency on the next ("English / Intermediate / French / Intermediate / …").
// Pair them into "English (Intermediate), French (Intermediate)". Falls back to a
// plain join when the lines aren't a clean name/level alternation.
const LANG_LEVELS={native:'Native','mother tongue':'Native',fluent:'Fluent',advanced:'Advanced',proficient:'Proficient',
  'upper intermediate':'Upper Intermediate',intermediate:'Intermediate','pre intermediate':'Pre-Intermediate',
  elementary:'Elementary',beginner:'Beginner',basic:'Basic',good:'Good',fair:'Fair',working:'Working',
  limited:'Limited',conversational:'Conversational',bilingual:'Bilingual'};
function levelCanon(s){const k=(s||'').toLowerCase().replace(/[^a-z]/g,'');for(const key in LANG_LEVELS)if(key.replace(/[^a-z]/g,'')===k)return LANG_LEVELS[key];return null;}
function pairLanguages(rawLines){
  const lines=(rawLines||[]).map(l=>(l||'').replace(/[•\-\*▪◦·‣«»‹›]/g,' ').replace(/\s{2,}/g,' ').trim()).filter(Boolean);
  // If a line already contains both name + level ("English: Fluent"), leave to parseLanguages.
  if(lines.some(l=>/[:\-(]/.test(l)&&levelCanon(l.split(/[:\-(]/).pop())))
    return lines.join(', ');
  const out=[];
  for(let i=0;i<lines.length;i++){
    const name=lines[i];
    if(levelCanon(name))continue;                       // a stray level with no name → skip
    const lvl=(i+1<lines.length)?levelCanon(lines[i+1]):null;
    if(lvl){out.push(`${name} (${lvl})`);i++;}
    else out.push(name);
  }
  return out.join(', ');
}

// Turn a block of section lines into a clean list of items. `splitPipes` also
// splits a single line that packs several items separated by | • · (common in
// certifications/training lines); achievements keep their full sentences.
function bulletizeList(arr,splitPipes){
  const out=[];
  for(const raw of (arr||[])){
    let l=(raw||'').replace(/\s{2,}/g,' ').trim();
    if(!l)continue;
    const parts=splitPipes? l.split(/\s*[|•▪◦‣]\s*/) : l.split(/\s*[•▪◦‣]\s*/);
    for(let p of parts){
      p=p.replace(/^[•\-\*▪◦·‣–—\s]+/,'').replace(/[;\s]+$/,'').trim();
      if(p&&p.replace(/\s/g,'').length>=3)out.push(p);
    }
  }
  return out;
}

/* Resolve a country dialing code, trusting an explicit country name in the CV
   text when the city is ambiguous (e.g. Tripoli → Lebanon vs Libya). */
const COUNTRY_CODES_BY_NAME=[
  [/\b(ksa|saudi arabia|kingdom of saudi arabia)\b/,'+966'],
  [/\b(uae|united arab emirates)\b/,'+971'],
  [/\bqatar\b/,'+974'],
  [/\bkuwait\b/,'+965'],
  [/\bbahrain\b/,'+973'],
  [/\boman\b/,'+968'],
  [/\blebanon\b/,'+961'],
  [/\bjordan\b/,'+962'],
  [/\begypt\b/,'+20'],
  [/\blibya\b/,'+218'],
  [/\bcyprus\b/,'+357'],
  [/\bsouth africa\b/,'+27'],
  [/\b(united kingdom|england)\b/,'+44'],
];
const AMBIGUOUS_CITY=new Set(['tripoli']);
function resolveCountryCode(clean,city){
  const low=(clean||'').toLowerCase();
  const cityCode=city?detectCode(city):null;
  if(city&&AMBIGUOUS_CITY.has(city.toLowerCase().trim())){
    for(const[re,c]of COUNTRY_CODES_BY_NAME)if(re.test(low))return c;
  }
  if(cityCode)return cityCode;
  for(const[re,c]of COUNTRY_CODES_BY_NAME)if(re.test(low))return c;
  return null;
}

// A header is a SHORT, STANDALONE label (e.g. "EMPLOYMENT HISTORY"), matched on
// the WHOLE line — never a keyword that merely appears inside a sentence. This
// prevents wrapped duty lines like "vision of the project" from being mistaken
// for a "Projects" heading and prematurely ending a section.
function headerKind(line){
  const t=(line||'').trim();
  if(/[.!?]$/.test(t))return undefined;               // sentences/wrapped tails (e.g. "community.") are never headers
  const norm=t.replace(/&/g,' and ').replace(/[^A-Za-z\s]/g,' ').replace(/\s+/g,' ').trim().toLowerCase();
  if(!norm||norm.length>40)return undefined;          // headings are short labels
  // ── exact whole-line headers (most reliable) ──
  if(/^(work experience|professional experience|professional career|experience|employment(?: history)?|work history|career(?: history| summary)?)$/.test(norm))return'experience';
  if(/^(education(?:al)?(?: background)?|education and training|academic(?: background)?|academic qualifications?|qualifications?)$/.test(norm))return'education';

  // / digital …) and the compound "technical and soft skills" sidebar label.
  if(/^((?:key|core|technical|professional|computer|software|it|digital|personal|soft|hard|other|additional|general|interpersonal)\s+)*(skills?|competenc(?:e|ies|y)|expertise|abilities|proficiencies)$/.test(norm.replace(/\band\b/g,' ').replace(/\s+/g,' ').trim())
     ||/^(expertise|areas of expertise|summary of qualifications)$/.test(norm))return'skills';

  if(/^(professional summary|career summary|executive summary|summary|executive profile|professional profile|personal profile|profile(?: summary)?|profile|career objective|objective|about(?: me)?|vision)$/.test(norm))return'summary';
  if(/^(certificat(?:e|es|ions?)|certifications and licen[cs]es|licen[cs]es?|professional certifications?)$/.test(norm))return'certifications';
  if(/^(trainings?|training and development|courses?|workshops?|trainings? and seminars?)$/.test(norm))return'training';
  if(/^((?:key |senior |notable )?(?:achievements?|accomplishments?)|awards?(?: and honou?rs)?|honou?rs|senior leadership achievements?)$/.test(norm))return'achievements';
  if(/^(volunteer(?:ing| work| experience)?|community service|social work)$/.test(norm))return'volunteer';
  // ── compound "X and Y" headers (from "&"/"and"): only treat as a header when
  //    the part BEFORE "and" is itself a recognized header (so skill items like

  if(/^(e ?mail|address|location|phone|mobile|tel|telephone|cell|date of birth|d o b|dob|birth date|nationality|gender|sex|marital status|age|visa|iqama|residence|residency|driving licen[cs]e)$/.test(norm))return'other';

}
function isHeader(line){return headerKind(line)!==undefined;}

    if(isHeader(ln)){const sct=sectionOf(ln);cur=out[sct]?sct:null;continue;}

  }

}

function guessName(lines){
  const re=/^[A-Za-z؀-ۿ][A-Za-z؀-ۿ.'’\-]*(?:\s+[A-Za-z؀-ۿ.'’\-]+){1,3}$/;

  const bad=l=>!l||l.length>40||/\d|@/.test(l)||/curriculum vitae|resume|سيرة ذاتية/i.test(l);

  // CVs often hide the name in a low-contrast banner OCR drops, so the first
  // "name-shaped" line can actually be a stray clause like "consistent launches."
  const looksLikeName=ln=>{
    if(!re.test(ln))return false;
    if(!/^[A-Z؀-ۿ]/.test(ln))return false;            // names start capitalized
    if(/[a-z]{2,}\.$/.test(ln))return false;          // "…launches." → a sentence tail, not a name
    if(ln.split(/\s+/).some(w=>/^(and|the|of|to|in|for|with|at|on|a|an|or)$/i.test(w)))return false;
    return true;
  };
  // The name sits at the very top — only consider lines BEFORE the first section header.
  let top=[];
  for(const raw of lines.slice(0,10)){if(isHeader(raw))break;top.push(raw);}
  if(!top.length)top=lines.slice(0,3);
  // pass 1 — a clean standalone name line at the top
  for(const raw of top){const ln=norm(raw);if(bad(ln)||isHeader(ln))continue;if(looksLikeName(ln))return ln;}
  // pass 2 — designed CVs print the name as an ALL-CAPS banner that, after a
  // sidebar column, can land deeper in the text (e.g. the contact column is
  // emitted first, then "AMAL WAHBI" at the top of the main column). Take the
  // first all-caps, 2–4 word, comma-free, alphabetic, non-header line.
  const isCapsName=raw=>{
    const t=norm(raw);
    if(bad(t)||isHeader(t)||/,/.test(t))return false;
    if(!/^[A-Z؀-ۿ][A-Z؀-ۿ.'’\-]*(?:\s+[A-Z؀-ۿ.'’\-]+){1,3}$/.test(t))return false;   // every word upper-case
    if(/\b(CV|RESUME|CURRICULUM|VITAE|PROFILE|REFERENCES?)\b/.test(t))return false;
    return true;
  };
  for(const raw of lines.slice(0,50)){if(isCapsName(raw))return norm(raw);}

  const wordRe=/^[A-Z][A-Za-z'’\-]{1,}$/;

    const a=norm(top[i]),b=norm(top[i+1]);
    if(bad(a)||bad(b))continue;
    if(wordRe.test(a)&&wordRe.test(b))return a+' '+b;
  }
  return'';
}
// The job title(s) printed directly under the name banner ("Marketing Coordinator
// / Business Operations Specialist"). Collect up to two short, non-header,
// non-contact role lines that follow the name; join with " · ".
function titleAfterName(lines,name){
  if(!name)return'';
  const low=name.toLowerCase();
  const idx=lines.findIndex(l=>(l||'').replace(/\s{2,}/g,' ').trim().toLowerCase()===low);
  if(idx<0)return'';
  const out=[];
  for(let i=idx+1;i<Math.min(lines.length,idx+4);i++){
    const t=(lines[i]||'').trim();
    if(!t||isHeader(t))break;
    if(/\d|@|linkedin\.com|\+\d/i.test(t))break;     // contact / date line
    if(/[.!?]$/.test(t)||t.split(/\s+/).length>6)break;   // sentence / too long for a role

}
// Fallback when the name banner isn't in the text (e.g. white-on-colour header an

// local-part. "linkedin.com/in/maria-el-chikhani-12345" → "Maria El Chikhani".
function nameFromContacts(linkedin,email){

  if(linkedin){
    const m=linkedin.match(/\/in\/([^\/?#\s]+)/i);

      const parts=slug.split('-').filter(p=>/^[a-z؀-ۿ'’]{2,}$/i.test(p));
      if(parts.length>=2&&parts.length<=4)return titleize(parts);
    }

    const lp=(email.split('@')[0]||'');
    if(/[._-]/.test(lp)){                            // only when there's a real separator
      const parts=lp.split(/[._-]+/).filter(p=>/^[a-z]{2,}$/i.test(p));

function guessTitle(lines,name){
  const i=lines.indexOf(name);
  if(i>=0&&lines[i+1]){const t=lines[i+1];if(t.length<48&&!/\d|@|linkedin/i.test(t)&&!isHeader(t))return t;}
  return'';
}
function guessCity(clean){
  const low=clean.toLowerCase();

  for(const city of Object.keys(CITY_CODES)){
    const m=low.match(new RegExp('\\b'+city.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b'));
    if(m&&m.index<bestIdx){bestIdx=m.index;best=tCase(city);}   // earliest mention ≈ contact/header city
