  return best;
}

// Robust job extractor. Handles the most common real-world layouts:
//   "Job Title at Company, City"      (header line)
//   "March 2023 — Present"            (date range on its OWN line)
//   "• bullet"  "• bullet"            (duties)
// …as well as headers where the date is on the same line, em/en-dash ranges,
// month-name ranges, and "Present/Current".
function extractJobs(lines){
  const jobs=[];
  const MONTHS='jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec';
  const presentRe=/present|current|ongoing|now|حتى الآن|till date|to date/i;
  // A single date token: present/current, or [Month ][MM/ or MM.]YYYY, or bare YYYY.
  // Supports numeric "10/2024" / "02-2023" dates as well as "Oct 2024" and "2024".
  const DTOK='(?:present|current|ongoing|(?:(?:'+MONTHS+')[a-z]*\\.?\\s*)?(?:\\d{1,2}\\s*[\\/.]\\s*)?(?:19|20)\\d{2})';
  const monthYear=new RegExp('(?:(?:'+MONTHS+')[a-z]*\\.?\\s*)?(?:\\d{1,2}\\s*[\\/.]\\s*)?(?:19|20)\\d{2}','i');
  const yearRe=/\b(19|20)\d{2}\b/;
  const isBullet=l=>/^[•\*▪◦·‣]\s?|^[-–—]\s+/.test(l);
  // A genuine date / date-range line: either a real "X – Y" range, or a line
  // that is essentially nothing but a single date token. NOT a prose line that
  // merely happens to contain a year.
  const RANGE_RE=new RegExp(DTOK+'(?:\\s*(?:–|—|-|to|till|until)\\s*)+'+DTOK,'i');   // allow "May 2026 – till Present"
  const SINGLE_RE=new RegExp('^\\s*'+DTOK+'(?:\\s*(?:–|—|-)\\s*(?:present|current))?\\s*$','i');
  function isDateLine(l){
    if(RANGE_RE.test(l))return true;          // a real date RANGE anchors a job even on a long header line
    if(l.length>46)return false;
    return SINGLE_RE.test(l);
  }
  function rangeDates(l){
    const pick=seg=>{if(presentRe.test(seg))return'Present';const m=seg.match(monthYear);return m?m[0].replace(/\s+/g,' ').trim():'';};
    // Isolate the explicit "date – date" span FIRST so a dash inside the title
    // ("Teaching Assistant – CHEN 201 … Jan 2026 – May 2026") can't hijack the split.
    const rm=l.match(RANGE_RE);
    const seg=rm?rm[0]:l;
    const parts=seg.split(/\s*(?:–|—|-|to|until|till)\s*/i).map(x=>x.trim()).filter(Boolean);
    if(parts.length>=2)return{from:pick(parts[0]),to:pick(parts[parts.length-1])};
    const all=seg.match(new RegExp(monthYear.source,'ig'))||[];
    return{from:all[0]?all[0].trim():'',to:presentRe.test(seg)?'Present':(all[1]?all[1].trim():'')};
  }
  function parseHeader(text){
    text=(text||'').replace(/^[•\-\*▪◦·‣\s]+/,'').replace(/\s{2,}/g,' ').trim();
    if(!text)return{title:'',company:''};
    let title='',company='';
    const at=text.split(/\s+(?:at|@|،|\|)\s+/i);
    if(at.length>=2){title=at[0];company=at.slice(1).join(' ');}
    else{const c=text.split(/\s*[,\-–—|]\s*/);title=c[0]||text;company=c[1]||'';}
    company=company.replace(/\s*,\s*[^,]+$/,'').replace(/^[|,\-–—\s]+|[|,\-–—\s]+$/g,'').trim();   // drop trailing ", City" + stray separators
    title=title.replace(/^[|,\-–—\s]+|[|,\-–—\s]+$/g,'').trim();
    return{title,company};
  }
  function headerFromDateLine(l){
    const stripped=l.replace(new RegExp(DTOK,'ig'),' ')
      .replace(new RegExp(presentRe.source,'ig'),' ')
      .replace(/\b(?:till|until|to|since|from)\b/ig,' ')   // connector words ("May 2026 – till Present")
      .replace(/\d{1,2}\s*[\/.]\s*/g,' ')        // stray "10/" remnants from MM/YYYY
      .replace(/[–—\-]+/g,' ').replace(/\s{2,}/g,' ').trim();
    if(stripped.replace(/[^A-Za-z]/g,'').length<2)return{title:'',company:''};  // only dates → no inline header
    return parseHeader(stripped);
  }
  // Role lexicon + location matcher — to split a "title-first" header block where
  // the role title sits on its own line above a "Company City, Country" line.
  const ROLE_RE=/\b(manager|supervisor|director|head|chef|waitress|waiter|agent|coordinator|leader|officer|assistant|consultant|engineer|analyst|executive|specialist|administrator|receptionist|cashier|host|hostess|barista|bartender|sommelier|captain|steward|stewardess|attendant|representative|associate|clerk|technician|designer|developer|accountant|teacher|trainer|nurse|driver|operator|planner|controller|secretary|intern|apprentice|foreman|owner|founder|partner|president|principal|lead|architect|writer|editor|photographer|videographer|marketer|recruiter|buyer|merchandiser|estimator|surveyor|paralegal|pharmacist|therapist|dietitian|waitstaff)\b/i;
  const LOC_WORDS=[...Object.keys(CITY_CODES),'ksa','uae','lebanon','saudi arabia','qatar','kuwait','bahrain','oman','jordan','egypt','syria','iraq','libya','tunisia','morocco','algeria','dbayeh','faqra','jounieh','zahle','sidon','tyre','byblos','achrafieh','hamra'];
  const LOC_RE=new RegExp('\\b('+LOC_WORDS.map(w=>w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','i');
  const deSpace=s=>(s||'').replace(/\b((?:[A-Za-z] ){2,}[A-Za-z])\b/g,m=>m.replace(/ /g,''));  // "B e i r u t" → "Beirut"
  const stripLoc=s=>{                          // cut a "Company City, Country" tail → just the company
    s=deSpace((s||'').replace(/\s+/g,' ').trim());
    const m=s.match(LOC_RE);
    if(m&&m.index>2)s=s.slice(0,m.index);
    return s.replace(/[\s,;:|–—-]+$/,'').replace(/^[\s,;:|–—-]+/,'').trim();
  };

  // A short Title-Case label that groups duties (e.g. "Treasury & Cash Management").
  // Such labels are dropped from duties so they don't pollute real achievements.
  const isSubHeading=l=>{
    if(!l||/[.!?,;]$/.test(l)||!/^[A-Z0-9]/.test(l))return false;
    const w=l.split(/\s+/);if(w.length>6)return false;
    const caps=w.filter(x=>/^[A-Z]/.test(x)).length;
    return /&/.test(l)||caps>=Math.ceil(w.length*0.6);
  };

  // Words that mark a wrapped line: a duty starting with an action verb is never a
  // job header, and a line ending in a conjunction/preposition is mid-sentence.
  const DUTY_VERB=/^(managed|oversaw|present|conceiv|develop|led|creat|mentor|handl|coordinat|supervis|design|implement|deliver|achiev|increas|reduc|built|build|launch|maintain|provid|assist|prepar|organ|ensur|improv|conduct|perform|responsib|work|collaborat|drove|spearhead|execut|establish|generat|negotiat|train|monitor|analy|process|operat|administ|direct|plan|produc|support|lead|grew|grow)/i;
  const FUNC_END=/\b(and|to|the|a|an|or|of|with|for|using|across|while|that|which|in|on|at|as|by|from|into|until|than|but)$/i;
  // A line that introduces a job ("Marketing Manager, watan play", "Title at Co").
  // NOT a duty sentence and NOT a wrapped fragment.
  const looksJobHeader=raw=>{
    const l=(raw||'').replace(/^[•\*▪◦·‣\s]+/,'').trim();
    if(!l||isBullet(l)||/[.!?]$/.test(l)||l.length>70||!/^[A-Z0-9]/.test(l))return false;
    if((DUTY_VERB.test(l)&&!ROLE_RE.test(l))||FUNC_END.test(l))return false;   // role words ("Assistant","Director") aren't duty verbs
    return /\s(?:at|@)\s|,|\s[–—|]\s|\s-\s/.test(l)||l.split(/\s+/).length<=5;
  };

  // Index-based pass, in two stages. First locate each job's header relative to its
  // date line — inline on it, on the line BELOW it (date-first layout) or the line
  // ABOVE it (title-first layout). Then collect the duties between consecutive jobs
  // and stitch line-wrapped sentences back together.
  const L=lines.map(x=>x.trim()).filter(Boolean);
  const dateAt=L.map((l,i)=>(!isBullet(l)&&isDateLine(l))?i:-1).filter(i=>i>=0);
  if(!dateAt.length)return[];
  const anchors=dateAt.map(di=>{
    const {from,to}=rangeDates(L[di]);
    let h=headerFromDateLine(L[di]),pos='inline',hIdx=di;   // header on the date line itself?
    if(!h.title&&!h.company){                               // …else in the header block directly ABOVE
      // Walk up collecting the contiguous header lines (title / company / optional
      // tagline). A title-first CV stacks "Area Manager" over "Jones The Grocer KSA
      // Riyadh, KSA" over the date. Stop at a duty (starts with an action verb / ends
      // a sentence) so a duty above a date-first job is never mistaken for a header.
      const block=[];
      for(let j=di-1;j>=0&&block.length<4;j--){
        const l=L[j];
        if(!l||dateAt.includes(j)||isBullet(l)||isHeader(l))break;
        if(/[.!?:]$/.test(l)||l.length>85||(DUTY_VERB.test(l)&&!ROLE_RE.test(l)))break;
        block.unshift(l);
      }
      if(block.length){
        const ri=block.findIndex(l=>ROLE_RE.test(l));        // the role-title line
        if(ri>=0){
          const roleLine=deSpace(block[ri].replace(/\s{2,}/g,' ').trim());
          const others=block.filter((_,i)=>i!==ri);
          const compLine=others.find(l=>LOC_RE.test(l))||others.find(Boolean)||'';
          // role line carries its own "Title – Company" and there's no separate
          // company line → split it; otherwise the company is the neighbouring line.
          if(!compLine&&/\s(?:at|@)\s|[,–—|]/.test(roleLine))h=parseHeader(roleLine);
          else h={title:roleLine,company:stripLoc(compLine)};
          pos='above';hIdx=di-block.length;
        }else if(looksJobHeader(block[block.length-1])){
          h=parseHeader(block[block.length-1]);pos='above';hIdx=di-block.length;
        }
      }
    }
    if(!h.title&&!h.company){                               // …else on the line directly BELOW (date-first)
      const bi=di+1;
      if(bi<L.length&&!dateAt.includes(bi)&&looksJobHeader(L[bi])){h=parseHeader(L[bi]);pos='below';hIdx=bi;}
    }
    if(!h.title&&!h.company)pos='none';
    return {di,from,to,h,pos,hIdx};
  });
  for(let k=0;k<anchors.length;k++){
    const a=anchors[k];
    const dutyStart=(a.pos==='below')?a.di+2:a.di+1;        // skip the header line when it sits below the date
    // a job ends where the next one begins — at its header (if above its date) or its date line
    const end=(k+1<anchors.length)?(anchors[k+1].pos==='above'?anchors[k+1].hIdx:anchors[k+1].di):L.length;
    const raw=[];
    for(let j=dutyStart;j<end;j++){
      const l=L[j];
      if(!l||isSubHeading(l)||(!isBullet(l)&&isDateLine(l)))continue;
      const t=l.replace(/^[•\-\*▪◦·‣\s]+/,'').replace(/\s{2,}/g,' ').trim();
      if(t&&t.replace(/\s/g,'').length>=2)raw.push(t);
    }
    // stitch wrapped lines: a continuation either starts lower-case or follows a
    // line that ended on a conjunction/preposition (and isn't already a sentence).
    const duties=[];
    for(const d of raw){
      const prev=duties[duties.length-1];
      if(prev&&!/[.!?]$/.test(prev)&&(/^[a-z]/.test(d)||FUNC_END.test(prev)))duties[duties.length-1]=prev+' '+d;
      else duties.push(d);
    }
    if(a.h.title||a.h.company||duties.length)jobs.push({company:a.h.company||'',title:a.h.title||'',from:a.from,to:a.to,duties});
  }
  return jobs.slice(0,14);
}

// Dateless fallback for CVs whose roles carry NO date range (or whose dates were

    }else if(cur){
      const t=l.replace(/^[•\*▪◦·‣«»+\-–—\s]+/,'').replace(/\s{2,}/g,' ').trim();
      if(t&&t.replace(/\s/g,'').length>=3)cur.duties.push(t);
    }
  }
  if(cur)jobs.push(cur);
  return jobs.filter(j=>j.duties.length).slice(0,8);
}

const EDU_LEVEL_RE=/(ph\.?\s?d|doctorate|master[''`]?s?|m\.?sc|mba|m\.?a\b|bachelor[''`]?s?(?:\s+degree)?|b\.?sc|b\.?a\b|b\.?eng|diploma|associate|baccalaureate|high\s*school|secondary|nqf|bt\s?\d|ts\s?\d|degree)/i;
// Institution keyword as a WHOLE word, so "Highschool"/"Internship" don't false-match.
const EDU_INST_RE=/\b(universit\w*|college|institute|institut|polytechnic|academy|faculty)\b|\bschool\b|جامعة|كلية|معهد/i;
const EDU_LOC_RE=/\b(lebanon|saudi arabia|ksa|uae|united arab emirates|qatar|kuwait|bahrain|oman|jordan|egypt|syria|iraq|france|germany|spain|italy|usa|uk|united kingdom|canada|turkey|cyprus|india|pakistan)\b/i;
const EDU_DATE_RE=/(?:(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?\s*)?(?:19|20)\d{2}\s*(?:[–—-]|to|till|until)\s*(?:present|current|(?:(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?\s*)?(?:19|20)\d{2})/i;
const EDU_YEAR_RE=/\b(19|20)\d{2}\b/;
// Parse the education block into a LIST of entries. A single entry can be laid out
// degree-first ("BSc / Computer Science / MIT / 2018") OR institution-first ("AUB |
// Beirut … 2022\n• Bachelor of …"); both occur in real CVs. So we DON'T split on the
// degree keyword (that wrongly tore a school away from its degree). Instead a new
// entry begins only once the current one ALREADY has both an institution and a
// degree and we meet another — the natural boundary between two schools.
function parseEduList(lines){
  let clean=(lines||[]).map(l=>(l||'').replace(/^[•\-\*▪◦·‣+«»\s]+/,'').replace(/\s{2,}/g,' ').trim()).filter(Boolean);
  if(!clean.length)return[];
  // Stitch a wrapped institution/degree name: a line ending on a conjunction,
  // "&" or comma continues onto the next ("University of Science and" +
  // "Technology (UST), Sudan – 2014" → one institution line).
  const EDU_WRAP=/(\b(?:and|of|the|for|de|del|la|las|el)$)|[&,]$/i;
  clean=clean.reduce((acc,l)=>{
    const prev=acc[acc.length-1];
    if(prev&&EDU_WRAP.test(prev)&&!/[.!?]$/.test(prev))acc[acc.length-1]=prev+' '+l;
    else acc.push(l);
    return acc;
  },[]);
  const hasInst=l=>EDU_INST_RE.test(l)&&!/high\s*school|highschool/i.test(l);
  // A degree line carries a level keyword but is NOT itself an institution — so
  // "Dekwaneh Secondary School" (institution containing "secondary") is not treated
  // as a degree, and doesn't wrongly split an entry.
  const hasDeg=l=>EDU_LEVEL_RE.test(l)&&!hasInst(l);
  const isYearLine=l=>EDU_DATE_RE.test(l)||(EDU_YEAR_RE.test(l)&&l.replace(/[^A-Za-z]/g,'').length<=4);  // "2005 - 2008" / "2014"
  const groups=[];let g=null;
  for(const l of clean){
    // A new entry begins once the current one is "complete" — it already carries a
    // year range (entries here are [qualification / institution / years] blocks) OR
    // it already has both an institution and a degree and we meet another.
    if(g&&(g.year||(hasInst(l)&&g.inst)||(hasDeg(l)&&g.deg))){g=null;}
    if(!g){g={lines:[],inst:false,deg:false,year:false};groups.push(g);}
    g.lines.push(l);
    if(hasInst(l))g.inst=true;
    if(hasDeg(l))g.deg=true;
    if(isYearLine(l))g.year=true;
  }
  const stripA=s=>(s||'').replace(/graduat\w*\s*:?/ig,'').replace(/,\s*,+/g,',')
    .replace(/\s{2,}/g,' ').replace(/^[–—\-,:|()\s]+|[–—\-,:|\s]+$/g,'').trim();
  // Remove the date range (and stray years) from the WHOLE line FIRST, so the
  // dash-splitter below can't tear "Sep.2022 – May 2027" into a stray "May" atom.
  const atomize=l=>(l||'').replace(EDU_DATE_RE,' ').replace(/\b(19|20)\d{2}\b/g,' ')
    .split(/\s*\|\s*|\s+[–—]\s+|\s+-\s+|\s{2,}/).map(stripA).filter(Boolean);
  const isLoc=a=>EDU_LOC_RE.test(a)||/^[A-Z][a-z]+,\s*[A-Z]/.test(a);
  const entries=groups.map(grp=>{
    const joined=grp.lines.join(' | ');
    const year=(joined.match(EDU_DATE_RE)||joined.match(EDU_YEAR_RE)||[''])[0].replace(/\s+/g,' ').trim();
    const instLine=grp.lines.find(hasInst)||'';
    // The qualification line: a recognized degree keyword, else the first non-inst,
    // non-year line ("Tourism Technical superior" carries no keyword but IS the level).
    const degLine =grp.lines.find(hasDeg)||grp.lines.find(l=>l!==instLine&&!isYearLine(l))||'';
    const instAtoms=atomize(instLine), degAtoms=atomize(degLine);
    const inst=instAtoms.find(a=>EDU_INST_RE.test(a)&&!/high\s*school|highschool/i.test(a))||instLine||'';
    // level = the cleanest degree phrase available
    const level=(degAtoms.find(a=>EDU_LEVEL_RE.test(a))||degLine||instAtoms.find(a=>EDU_LEVEL_RE.test(a))||'').trim();
    // field = subject / campus / honour, from the inst & degree lines plus any SHORT
    // standalone label line — never the long achievement sentences (those run long
    // or end in punctuation and are excluded).
    const extra=grp.lines.filter(l=>l!==instLine&&l!==degLine&&!/[.!?]$/.test(l)&&l.split(/\s+/).length<=5);
    const pool=[...instAtoms,...degAtoms,...extra.flatMap(atomize)];
    const seen=new Set(),field=[];
    for(const a of pool){
      if(!a||a===inst||a===level||isLoc(a)||EDU_DATE_RE.test(a)||/^(19|20)\d{2}$/.test(a))continue;
      if(EDU_INST_RE.test(a)||a.split(/\s+/).length>8)continue;
      const k=a.toLowerCase();if(seen.has(k))continue;seen.add(k);field.push(a);
    }
    return{level,field:field.join(', '),inst,year};
  }).filter(e=>e.level||e.inst);
  return entries;
}
function parseEdu(lines){
  const list=parseEduList(lines);
  cv.eduList=list;
  if(list.length){const e=list[0];cv.eduLevel=e.level;cv.eduField=e.field;cv.eduInst=e.inst;cv.eduYear=e.year;}
}

async function finalizeUpload(){
  if(!cv.yearsExp)cv.yearsExp='several years';
  setProgress(95);
  await botSay(s().draftReady);
  await botSay(s().consentMsg);
  await botSay(s().privacyNote(PRIVACY_EMAIL));
  choicesEl().innerHTML='';choicesEl().classList.remove('hidden');inputRow().classList.add('hidden');

  const cLabel=document.createElement('label');
  cLabel.style.cssText='display:flex;align-items:center;gap:9px;font-size:12.5px;color:#075E54;background:white;border:1.5px solid #25D366;border-radius:14px;padding:9px 14px;cursor:pointer;max-width:92%;line-height:1.4;';
  const cBox=document.createElement('input');
  cBox.type='checkbox';cBox.style.cssText='width:18px;height:18px;flex-shrink:0;accent-color:#075E54;cursor:pointer;';
  const cText=document.createElement('span');cText.innerHTML=fmt(s().consentLabel);
  cLabel.appendChild(cBox);cLabel.appendChild(cText);choicesEl().appendChild(cLabel);

  const go=document.createElement('button');go.className='choice-btn primary';go.textContent=s().viewDraft;
  go.onclick=()=>{
    if(!cBox.checked){botSay(s().consentRequired,true);return;}
    cv.consent=true;choicesEl().classList.add('hidden');userSay(s().viewDraft);
    setProgress(100);showCV();
  };
  choicesEl().appendChild(go);
}

/* ══════════════════════════════════════════════
   EDIT FORM  (review & correct any field, then re-render)
══════════════════════════════════════════════ */
function efField(id,label,val,opts={}){
  const w=document.createElement('div');w.className='ef-field';
  if(label){const l=document.createElement('label');l.textContent=label;w.appendChild(l);}
  const el=document.createElement(opts.area?'textarea':'input');
  if(opts.cls)el.className=opts.cls;else el.id=id;
  el.value=val||'';if(opts.ph)el.placeholder=opts.ph;
  w.appendChild(el);return w;
}
function efGroup(title,fields){
  const g=document.createElement('div');g.className='ef-group';
  const h=document.createElement('h4');h.textContent=title;g.appendChild(h);
  fields.forEach(f=>g.appendChild(f));return g;
}
function efJobCard(job){
  const st=s();
  const card=document.createElement('div');card.className='ef-job';
  const rm=document.createElement('button');rm.type='button';rm.className='rm';rm.textContent=st.efRemove;
  rm.onclick=()=>card.remove();card.appendChild(rm);
  card.appendChild(efField('',st.efJobTitle,job.title,{cls:'j-title'}));
  card.appendChild(efField('',st.efCompany,job.company,{cls:'j-company'}));
  const row=document.createElement('div');row.className='ef-row';
  row.appendChild(efField('',st.efFrom,job.from,{cls:'j-from'}));
  row.appendChild(efField('',st.efTo,job.to,{cls:'j-to'}));
  card.appendChild(row);
  card.appendChild(efField('',st.efDuties,(job.duties||[]).join('\n'),{cls:'j-duties',area:true}));
  return card;
}
function efEduCard(e){
  const st=s();
  const card=document.createElement('div');card.className='ef-job ef-edu-card';
  const rm=document.createElement('button');rm.type='button';rm.className='rm';rm.textContent=st.efRemove;
  rm.onclick=()=>card.remove();card.appendChild(rm);
  card.appendChild(efField('',st.efLevel,e.level,{cls:'e-level'}));
  card.appendChild(efField('',st.efField,e.field,{cls:'e-field'}));
  const row=document.createElement('div');row.className='ef-row';
  row.appendChild(efField('',st.efInst,e.inst,{cls:'e-inst'}));
  row.appendChild(efField('',st.efYear,e.year,{cls:'e-year'}));
  card.appendChild(row);
  return card;
}
function openEditForm(){
  const st=s();
  document.getElementById('edit-title').textContent=st.editTitle;
  document.getElementById('edit-cancel').textContent=st.editCancel;
  const ap=document.getElementById('edit-apply');ap.textContent=st.editApply;ap.disabled=false;
  const body=document.getElementById('edit-body');body.innerHTML='';

  body.appendChild(efGroup(st.efContact,[
    efField('ef-name',st.efName,cv.name),
    efField('ef-title',st.efJobTitle,cv.title),
    efField('ef-city',st.efCity,cv.city),
    efField('ef-email',st.efEmail,cv.email),
    efField('ef-phone',st.efPhone,cv.phone),
    efField('ef-phone2',st.efPhone+' 2',cv.phone2),
    efField('ef-linkedin',st.efLinkedin,cv.linkedin),
    efField('ef-nationality',st.efNationality,cv.nationality),
    efField('ef-visa',st.efVisa,cv.visa),
  ]));

  const expG=efGroup(st.efExp,[efField('ef-years',st.efYears,cv.yearsExp)]);
  const jobsWrap=document.createElement('div');jobsWrap.id='ef-jobs';
  (cv.jobs.length?cv.jobs:[{company:'',title:'',from:'',to:'',duties:[]}]).forEach(j=>jobsWrap.appendChild(efJobCard(j)));
  expG.appendChild(jobsWrap);
  const add=document.createElement('button');add.type='button';add.className='ef-add';add.textContent=st.efAddJob;
  add.onclick=()=>{if(jobsWrap.children.length<8)jobsWrap.appendChild(efJobCard({company:'',title:'',from:'',to:'',duties:[]}));};
  expG.appendChild(add);body.appendChild(expG);

  // Education — repeatable list (people often have 2–3 degrees)
  const eduG=efGroup(st.efEducation,[]);
  const eduWrap=document.createElement('div');eduWrap.id='ef-edu';
  const eduSrc=(cv.eduList&&cv.eduList.length)?cv.eduList:[{level:cv.eduLevel,field:cv.eduField,inst:cv.eduInst,year:cv.eduYear}];
  eduSrc.forEach(e=>eduWrap.appendChild(efEduCard(e)));
  eduG.appendChild(eduWrap);
  const addE=document.createElement('button');addE.type='button';addE.className='ef-add';addE.textContent='➕ '+st.efEducation;
  addE.onclick=()=>{if(eduWrap.children.length<5)eduWrap.appendChild(efEduCard({level:'',field:'',inst:'',year:''}));};
  eduG.appendChild(addE);body.appendChild(eduG);

  body.appendChild(efGroup(st.efSkills,[efField('ef-skills','',cv.skills,{area:true})]));
  body.appendChild(efGroup(st.secCert,[efField('ef-certs','',cv.certifications,{area:true,ph:st.efCerts})]));
  body.appendChild(efGroup(st.secTrain,[efField('ef-training','',cv.training,{area:true,ph:st.efTraining})]));
  body.appendChild(efGroup(st.secAch,[efField('ef-ach','',cv.achievements,{area:true,ph:st.efAch})]));
  body.appendChild(efGroup(st.secVol,[efField('ef-vol','',cv.volunteer,{area:true,ph:st.efVol})]));
  body.appendChild(efGroup(st.efLangs,[efField('ef-langs','',cv.langs)]));

  document.getElementById('edit-overlay').classList.add('open');
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');}
async function applyEdit(){
  const v=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  cv.name=v('ef-name');cv.title=v('ef-title');cv.city=v('ef-city');
  cv.email=v('ef-email');cv.phone=v('ef-phone');cv.phone2=v('ef-phone2');cv.linkedin=v('ef-linkedin');
  cv.nationality=v('ef-nationality');cv.visa=v('ef-visa');
  cv.yearsExp=v('ef-years')||'several years';
  cv.jobs=[...document.querySelectorAll('#ef-jobs .ef-job')].map(card=>{
    const g=cls=>{const e=card.querySelector('.'+cls);return e?e.value.trim():'';};
    return{company:g('j-company'),title:g('j-title'),from:g('j-from'),to:g('j-to'),
      duties:g('j-duties').split('\n').map(d=>d.trim()).filter(Boolean)};
  }).filter(j=>j.title||j.company||j.duties.length);
  cv.eduList=[...document.querySelectorAll('#ef-edu .ef-edu-card')].map(card=>{
    const g=cls=>{const e=card.querySelector('.'+cls);return e?e.value.trim():'';};
    return{level:g('e-level'),field:g('e-field'),inst:g('e-inst'),year:g('e-year')};
  }).filter(e=>e.level||e.inst||e.field);
  const e0=cv.eduList[0]||{level:'',field:'',inst:'',year:''};
  cv.eduLevel=e0.level;cv.eduField=e0.field;cv.eduInst=e0.inst;cv.eduYear=e0.year;
  cv.skills=v('ef-skills');cv.langs=v('ef-langs');
  cv.certifications=v('ef-certs');cv.training=v('ef-training');cv.achievements=v('ef-ach');cv.volunteer=v('ef-vol');
  cv.countryCode=detectCode(cv.city)||cv.countryCode;

  const ap=document.getElementById('edit-apply');ap.disabled=true;ap.textContent='…';
  await translateCV();cv.langs=await translateToEn(cv.langs);cv.eduLevel=await translateToEn(cv.eduLevel);
  closeEdit();showCV();
}

window.onload=()=>{
  document.getElementById('cv-file').onchange=e=>{const f=e.target.files&&e.target.files[0];e.target.value='';if(f)handleFile(f);};
  run();
};
