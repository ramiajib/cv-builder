<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CV Builder | مساعد السيرة الذاتية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family:'Segoe UI',Arial,sans-serif; background:#ECE5DD; min-height:100vh; display:flex; flex-direction:column; max-width:480px; margin:0 auto; }
    .header { background:#075E54; color:white; padding:10px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
    .avatar { width:42px; height:42px; background:#25D366; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .header h1 { font-size:16px; font-weight:600; }
    .header p  { font-size:12px; opacity:.75; margin-top:1px; }
    .prog-wrap { background:#054c44; height:4px; }
    .prog-bar  { height:100%; background:#25D366; transition:width .6s ease; width:0; }
    .chat { flex:1; overflow-y:auto; padding:14px 12px 10px; display:flex; flex-direction:column; gap:6px; }
    .bubble { max-width:84%; padding:9px 13px; border-radius:8px; font-size:14px; line-height:1.6; word-wrap:break-word; animation:pop .2s ease; }
    @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .bubble-bot  { background:white; border-top-left-radius:0; align-self:flex-start; box-shadow:0 1px 2px rgba(0,0,0,.1); }
    .bubble-user { background:#DCF8C6; border-top-right-radius:0; align-self:flex-end; box-shadow:0 1px 2px rgba(0,0,0,.1); }
    .dots{display:flex;gap:5px;align-items:center;padding:3px 2px}
    .dots span{width:8px;height:8px;background:#bbb;border-radius:50%;animation:bounce 1.1s infinite}
    .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:none}30%{transform:translateY(-6px)}}
    .spin{width:16px;height:16px;border:2.5px solid #d9d9d9;border-top-color:#075E54;border-radius:50%;display:inline-block;animation:rot .7s linear infinite;flex-shrink:0}
    @keyframes rot{to{transform:rotate(360deg)}}
    .choices{display:flex;flex-wrap:wrap;gap:8px;padding:6px 12px 10px;justify-content:center}
    .choice-btn{border:1.5px solid #25D366;background:white;color:#075E54;padding:8px 18px;border-radius:20px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s}
    .choice-btn:hover,.choice-btn:active{background:#25D366;color:white}
    .choice-btn.primary{background:#075E54;color:white;font-size:14px;padding:12px 26px;border-color:#075E54}
    .choice-btn.primary:hover{background:#054c44}
    .input-row{background:#F0F0F0;padding:8px 10px;display:flex;gap:8px;align-items:flex-end}
    .chat-input{flex:1;border:none;border-radius:20px;padding:10px 16px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:130px}
    .send-btn{width:44px;height:44px;background:#25D366;border:none;border-radius:50%;color:white;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .send-btn:hover{background:#128C7E}
    .hidden{display:none!important}
    body.rtl{direction:rtl}
    body.rtl .bubble-bot{border-top-left-radius:8px;border-top-right-radius:0}
    body.rtl .bubble-user{border-top-right-radius:8px;border-top-left-radius:0}
    body.rtl .chat-input{text-align:right}
    /* CV Overlay */
    #cv-overlay{display:none;position:fixed;inset:0;background:white;z-index:1000;flex-direction:column}
    #cv-overlay.open{display:flex}
    #cv-toolbar{background:#075E54;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
    #cv-toolbar button{background:none;border:none;color:white;cursor:pointer;font-family:inherit;font-size:13px}
    #cv-toolbar .back-btn{font-size:22px;line-height:1;padding:0 4px}
    #cv-toolbar .title{font-size:15px;font-weight:600;flex:1;text-align:center}
    #cv-toolbar .save-btn{background:#25D366;padding:7px 14px;border-radius:16px;font-weight:600;white-space:nowrap}
    #cv-toolbar .save-btn:hover{background:#1ea855}
    #cv-scroll{flex:1;overflow-y:auto;background:#f4f4f4}
    #cv-rendered{background:white;max-width:800px;margin:16px auto;box-shadow:0 2px 8px rgba(0,0,0,.12)}
    #cv-footer{background:#f0f0f0;padding:12px 16px;text-align:center;flex-shrink:0;border-top:1px solid #ddd}
    #cv-footer .save-main{background:#075E54;color:white;border:none;border-radius:8px;padding:13px 32px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
    #cv-footer .save-main:hover{background:#054c44}
    #cv-footer .edit-main{background:#fff;color:#075E54;border:1.5px solid #075E54;border-radius:8px;padding:12px 32px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-bottom:8px}
    #cv-footer .edit-main:hover{background:#eef4ff}
    #cv-footer .print-hint{font-size:11px;color:#777;margin-top:8px;line-height:1.5}
    /* Edit form overlay */
    #edit-overlay{display:none;position:fixed;inset:0;background:#f4f4f4;z-index:1500;flex-direction:column}
    #edit-overlay.open{display:flex}
    #edit-bar{background:#075E54;color:#fff;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    #edit-bar .title{font-size:15px;font-weight:600}
    #edit-bar button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;font-family:inherit;line-height:1}
    #edit-body{flex:1;overflow-y:auto;padding:14px}
    .ef-group{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .ef-group h4{margin:0 0 10px;font-size:12px;color:#075E54;text-transform:uppercase;letter-spacing:.6px}
    .ef-field{margin-bottom:10px}
    .ef-field label{display:block;font-size:12px;color:#555;margin-bottom:4px}
    .ef-field input,.ef-field textarea{width:100%;border:1px solid #ccc;border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none}
    .ef-field input:focus,.ef-field textarea:focus{border-color:#25D366}
    .ef-field textarea{resize:vertical;min-height:70px}
    .ef-job{border:1px solid #e0e0e0;border-radius:10px;padding:12px 12px 4px;margin-bottom:10px;position:relative;background:#fafafa}
    .ef-job .rm{position:absolute;top:8px;inset-inline-end:8px;background:#fdecea;color:#c0392b;border:none;border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;font-family:inherit}
    .ef-row{display:flex;gap:8px}
    .ef-row .ef-field{flex:1}
    .ef-add{background:#eef4ff;border:1px dashed #1A3A5C;color:#1A3A5C;border-radius:8px;padding:10px;width:100%;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
    #edit-foot{background:#fff;padding:12px;flex-shrink:0;border-top:1px solid #ddd;display:flex;gap:10px}
    #edit-foot button{flex:1;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    #edit-foot .cancel{background:#eee;color:#444}
    #edit-foot .apply{background:#075E54;color:#fff}
    #edit-foot .apply:disabled{opacity:.6;cursor:default}
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar">📄</div>
    <div><h1 id="hdr-title">CV Builder</h1><p id="hdr-sub">Free · Professional · ATS-Ready</p></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="pbar"></div></div>
  <div class="chat" id="chat"></div>
  <div class="choices hidden" id="choices"></div>
  <div class="input-row" id="input-row">
    <textarea class="chat-input" id="inp" rows="1" placeholder="Type here…" onkeydown="onKey(event)"></textarea>
    <button class="send-btn" onclick="send()">&#9658;</button>
  </div>
  <div id="cv-overlay">
    <div id="cv-toolbar">
      <button class="back-btn" onclick="closeCV()">&#8592;</button>
      <span class="title" id="cv-toolbar-title">Your CV</span>
      <button class="save-btn" onclick="savePDF()">💾 Save PDF</button>
    </div>
    <div id="cv-scroll"><div id="cv-rendered"></div></div>
    <div id="cv-footer">
      <button class="edit-main" id="cv-edit-btn" onclick="openEditForm()">✏️ Edit details</button>
      <button class="save-main" onclick="savePDF()">💾 Save as PDF</button>
      <p class="print-hint" id="cv-footer-hint">Downloads a real PDF with selectable, <strong>ATS-readable</strong> text.</p>
    </div>
  </div>
  <input type="file" id="cv-file" accept=".pdf,.png,.jpg,.jpeg,.webp,image/*" style="display:none">
  <div id="edit-overlay">
    <div id="edit-bar">
      <span class="title" id="edit-title">Edit your CV</span>
      <button onclick="closeEdit()">&#10005;</button>
    </div>
    <div id="edit-body"></div>
    <div id="edit-foot">
      <button class="cancel" id="edit-cancel" onclick="closeEdit()">Cancel</button>
      <button class="apply" id="edit-apply" onclick="applyEdit()">Apply changes</button>
    </div>
  </div>

function fmtPhone(p,code){
  if(!p)return'';
  const codeDigits=(code||'').replace(/\D/g,'');
  let t=p.replace(/[^\d+]/g,'');
  if(t.startsWith('00'))t='+'+t.slice(2);            // international 00-prefix → +
  if(!t.startsWith('+')){
    const digits=t.replace(/\D/g,'');
    if(codeDigits&&digits.startsWith(codeDigits))t='+'+digits;        // already carries the country code
    else if(code)t=code+digits.replace(/^0+/,'');                     // local number → add code (drop trunk 0)
    else return p.trim();
  }
  // already has a country code embedded (e.g. 00966… / +966…) → never prepend it again
  if(codeDigits&&t.startsWith('+'+codeDigits))return '+'+codeDigits+' '+t.slice(1+codeDigits.length);
  return t;
}

function hasArabic(t){return /[؀-ۿ]/.test(t||'');}
// Persistent translation cache — avoids repeat API calls across builds and sessions
const TR_CACHE=(()=>{try{return JSON.parse(localStorage.getItem('cvb_tr')||'{}');}catch(e){return{};}})();
function trCacheSave(){try{localStorage.setItem('cvb_tr',JSON.stringify(TR_CACHE));}catch(e){}}
async function translateToEn(text){
  if(!text||!hasArabic(text))return text;          // already English / no Arabic → no network
  const q=text.trim();
  if(TR_CACHE[q]!==undefined)return TR_CACHE[q];    // cache hit → no network
  let out=null;
  // 1) Google (unofficial) — best quality
  try{
    const r=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=ar&tl=en&dt=t&q='+encodeURIComponent(q));
    if(r.ok){
      const data=await r.json();
      if(Array.isArray(data)&&Array.isArray(data[0])){
        const g=data[0].map(seg=>seg&&seg[0]?seg[0]:'').join('').trim();
        if(g)out=g;
      }
    }
  }catch(e){}
  // 2) MyMemory — CORS-friendly fallback
  if(!out){
    try{
      const r=await fetch('https://api.mymemory.translated.net/get?langpair=ar|en&q='+encodeURIComponent(q));
      if(r.ok){
        const data=await r.json();
        const m=data&&data.responseData&&data.responseData.translatedText;
        if(m&&m.trim()&&!/MYMEMORY WARNING|QUERY LENGTH LIMIT/i.test(m))out=m.trim();
      }
    }catch(e){}
  }
  if(out){TR_CACHE[q]=out;trCacheSave();return out;}// cache only successful translations
  return text;                                      // both failed → keep original gracefully
}
// Translate every user-typed free-text field into English before rendering
async function translateCV(){
  cv.name=await translateToEn(cv.name);
  cv.title=await translateToEn(cv.title);
  cv.city=await translateToEn(cv.city);
  if(cv.relocateWhere)cv.relocateWhere=await translateToEn(cv.relocateWhere);
  if(cv.summary)cv.summary=await translateToEn(cv.summary);
  cv.skills=await translateToEn(cv.skills);
  cv.eduField=await translateToEn(cv.eduField);
  cv.eduInst=await translateToEn(cv.eduInst);
  for(const j of cv.jobs){
    j.company=await translateToEn(j.company);
    j.title=await translateToEn(j.title);
    j.from=await translateToEn(j.from);
    j.to=await translateToEn(j.to);
    const out=[];
    for(const d of j.duties)out.push(await translateToEn(d));
    j.duties=out;
  }
}

function fixSpell(str){
  let r=str;
  const keys=Object.keys(SPELL).sort((a,b)=>b.length-a.length);
  for(const k of keys){
    r=r.replace(new RegExp('\\b'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi'),m=>{
      const v=SPELL[k];
      if(m===m.toUpperCase())return v.toUpperCase();
      if(m[0]===m[0].toUpperCase())return v.charAt(0).toUpperCase()+v.slice(1);
      return v;
    });
  }
  return r;
}

const PAST_IRR={make:'made',take:'took',drive:'drove',keep:'kept',sell:'sold',build:'built',lead:'led',run:'ran',do:'did',write:'wrote',send:'sent',deal:'dealt',meet:'met',hold:'held',pay:'paid',read:'read',leave:'left',speak:'spoke',oversee:'oversaw',draw:'drew',grow:'grew',win:'won',cost:'cost',hit:'hit',set:'set',cut:'cut',put:'put',get:'got',give:'gave',teach:'taught',buy:'bought',bring:'brought',find:'found',sweep:'swept',mean:'meant',wear:'wore',
  plan:'planned',stop:'stopped',ship:'shipped',chop:'chopped',mop:'mopped',scrub:'scrubbed',wrap:'wrapped',log:'logged',tag:'tagged',map:'mapped',grab:'grabbed',plot:'plotted',fit:'fitted'};
const BASE_VERBS=new Set('manage handle prepare cook clean serve sell drive deliver answer help assist organize arrange schedule train supervise lead coordinate maintain repair install build create design write edit film shoot photograph operate monitor track record enter process calculate count stock order purchase negotiate plan develop execute support resolve respond greet welcome check inspect test taste cut chop wash package load unload transport collect distribute file type print scan update review audit reconcile teach mentor guide run oversee direct control set fix replace paint weld wire bake grill fry mix measure weigh pack make take keep send meet hold pay clean cover lift carry stack sort label pack ring scan stamp sign draft compile gather'.split(' '));
const DUTY_GENERIC_VERBS=['Handled','Managed','Oversaw','Coordinated','Carried out'];
const DUTY_SUFFIX=[
  'ensuring consistent quality and full adherence to company standards',
  'maintaining a high level of accuracy, efficiency, and professionalism throughout',
  'contributing to smooth daily operations and the overall success of the team',
  'consistently meeting deadlines while exceeding performance expectations',
  'helping to maintain a positive, productive, and well-organized work environment',
  'delivering reliable results with strong attention to detail and care',
];
function pastTense(w){
  const lw=w.toLowerCase().replace(/[^a-z]/g,'');
  if(PAST_IRR[lw])return PAST_IRR[lw];
  if(/(ed|ing)$/.test(lw))return lw;
  if(/e$/.test(lw))return lw+'d';
  if(/[^aeiou]y$/.test(lw))return lw.slice(0,-1)+'ied';
  return lw+'ed';
}
function genericDuty(raw){
  // Non-English (e.g. Arabic) free text can't be translated offline — keep it as typed
  if(/[؀-ۿ]/.test(raw))return raw.trim().replace(/^[\-•*\s]+/,'').replace(/[.,؛\s]+$/,'');
  let t=fixSpell(raw.trim()).replace(/^[\-•*\s]+/,'').replace(/[.;,\s]+$/,'');
  if(!t)return'';
  const words=t.split(/\s+/);
  if(words.length>=12)return capFirst(t);            // already a full, detailed line
  const suf=DUTY_SUFFIX[hashStr(t)%DUTY_SUFFIX.length];
  const first=words[0].toLowerCase().replace(/[^a-z]/g,'');
  const rest=words.slice(1).join(' ');
  let body;
  if(BASE_VERBS.has(first)||/(ed|ing)$/.test(first)){
    body=capFirst(pastTense(words[0]))+(rest?' '+rest:'');
  }else{
    body=`${DUTY_GENERIC_VERBS[hashStr(t)%DUTY_GENERIC_VERBS.length]} ${t}`;
  }
  return `${body}, ${suf}`;
}
function enhanceDuty(raw,preserve){
  if(!raw)return'';
  const fixed=fixSpell(raw.trim());
  // Uploaded CVs usually already contain strong, specific bullets. Keep those
  // verbatim (spell-fixed + capitalized) instead of replacing real achievements
  // with generic canned text.
  if(preserve){
    const clean=fixed.replace(/^[•\-\*▪◦·‣\s]+/,'').replace(/\s{2,}/g,' ').trim();
    if(clean.split(/\s+/).filter(Boolean).length>=8)return capFirst(clean);
  }
  for(const[pat,exp]of DUTY_MAP){
    if(pat.test(fixed)||pat.test(raw))return exp;
  }
  return genericDuty(raw);                            // fallback now expands too
}

const SKILL_MAP={
  'cook':'Food Preparation & Cooking','cooking':'Food Preparation & Cooking',
  'clean':'Kitchen Sanitation & Hygiene','cleaning':'Kitchen Sanitation & Hygiene',
  'cut vegetables':'Knife Skills & Mise en Place','cut vegetabels':'Knife Skills & Mise en Place',
  'taste food':'Food Quality Control','teste food':'Food Quality Control',
  'manage team':'Team Leadership & Supervision',
  'driving':'Driving (Valid License)','drive':'Driving (Valid License)',
  'computer':'Computer Proficiency',
  'ms office':'Microsoft Office Suite','microsoft office':'Microsoft Office Suite',
  'ms word':'Microsoft Word','ms excel':'Microsoft Excel',
  'excel':'Microsoft Excel','word':'Microsoft Word','powerpoint':'Microsoft PowerPoint',
  'data entry':'Data Entry & Record Keeping',
  'customer service':'Customer Service','time management':'Time Management',
  'communication':'Communication Skills','teamwork':'Teamwork & Collaboration',
  'problem solving':'Problem-Solving','leadership':'Team Leadership',
  'typing':'Touch Typing','filing':'Document Management',
  'scheduling':'Scheduling & Planning','inventory':'Inventory Management',
  'cash handling':'Cash Handling & POS','training':'Staff Training & Development',
  'sales':'Sales & Client Relations','marketing':'Marketing & Promotion',
  'social media':'Social Media Management',
  'photography':'Photography','filming':'Videography & Filming',
  'videography':'Videography & Filming','editing':'Video & Photo Editing',
  'photo editing':'Photo Editing','video editing':'Video Editing',
  'lightroom':'Adobe Lightroom','premiere':'Adobe Premiere Pro',
  'after effects':'Adobe After Effects','photoshop':'Adobe Photoshop',
  'drone':'Drone Operation','aerial photography':'Aerial Photography',
  'lighting':'Lighting & Studio Setup',
};
function enhanceSkill(raw){
  if(!raw)return'';
  const key=fixSpell(raw).toLowerCase().trim();
  if(SKILL_MAP[key])return SKILL_MAP[key];
  for(const[k,v]of Object.entries(SKILL_MAP)){if(key.includes(k))return v;}
  return fixAcr(tCase(fixSpell(raw.trim())));
}

// Enhance (not copy-paste) an existing profile/summary: clean it, then extend it
// with a polished, skills-aware professional close. Returns null if there isn't
// enough usable text, so the caller can fall back to a fully generated summary.
function enhanceSummary(raw,skills){
  let base=fixAcr(capFirst(fixSpell((raw||'').trim())));
  base=base.replace(/\s+/g,' ').replace(/[.\s]+$/,'').trim();
  if(base.length<40)return null;
  const strengths=(skills&&skills.length)
    ? ` Brings recognized strengths in ${skills.slice(0,3).join(', ')}, paired with a proactive, solutions-focused mindset and sharp attention to detail.`
    : ` Combines strong technical expertise with a proactive, solutions-focused mindset and sharp attention to detail.`;
  return `${base}.${strengths} Consistently delivers high-quality, reliable results and is now seeking a role offering new challenges, greater responsibility, and meaningful, measurable impact.`;
}

function pdfFilename(name){
  return name.trim().split(/\s+/).map(p=>p.charAt(0).toUpperCase()+p.slice(1).toLowerCase()).join('_')+'_CV';
}

const chatEl=()=>document.getElementById('chat');
const inpEl=()=>document.getElementById('inp');
const choicesEl=()=>document.getElementById('choices');
const inputRow=()=>document.getElementById('input-row');
function setProgress(p){document.getElementById('pbar').style.width=Math.min(100,p)+'%';}
function scrollDown(){const c=chatEl();c.scrollTop=c.scrollHeight;}
function fmt(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}

function botSay(text,fast){
  return new Promise(resolve=>{
    const typing=document.createElement('div');
    typing.className='bubble bubble-bot';
    typing.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
    chatEl().appendChild(typing);scrollDown();
    const d=fast?250:Math.min(1400,350+text.replace(/<[^>]+>/g,'').length*14);
    setTimeout(()=>{
      typing.remove();
      const b=document.createElement('div');
      b.className='bubble bubble-bot';b.innerHTML=fmt(text);
      chatEl().appendChild(b);scrollDown();resolve();
    },d);
  });
}
function userSay(text){
  const b=document.createElement('div');b.className='bubble bubble-user';b.textContent=text;
  chatEl().appendChild(b);scrollDown();
}
// Live loading bubble with a spinner; returns the element so the caller can remove it
function showLoader(text){
  const b=document.createElement('div');b.className='bubble bubble-bot';
  b.style.display='flex';b.style.alignItems='center';b.style.gap='9px';
  b.innerHTML='<span class="spin"></span><span>'+fmt(text)+'</span>';
  chatEl().appendChild(b);scrollDown();
  return b;
}

/* ══════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════ */
function ask(opts={}){
  return new Promise(resolve=>{
    choicesEl().innerHTML='';
    if(opts.choices){
      inputRow().classList.add('hidden');
      choicesEl().classList.remove('hidden');
      opts.choices.forEach(c=>{
        const btn=document.createElement('button');
        btn.className='choice-btn';btn.textContent=c;
        btn.onclick=()=>{choicesEl().classList.add('hidden');inputRow().classList.remove('hidden');userSay(c);resolve(c);};
        choicesEl().appendChild(btn);
      });
    } else {
      inpEl().rows=opts.multiline?4:1;
      inpEl().placeholder=s().ph;
      if(opts.optional){
        choicesEl().classList.remove('hidden');
        const skip=document.createElement('button');skip.className='choice-btn';skip.textContent=s().skip;
        skip.onclick=()=>{choicesEl().classList.add('hidden');userSay('—');resolver=null;inputLive=false;resolve('');};
        choicesEl().appendChild(skip);
      } else{choicesEl().classList.add('hidden');}
      inputRow().classList.remove('hidden');inpEl().focus();
      resolver=async val=>{
        if(!val&&!opts.optional){await botSay(s().err_empty,true);inpEl().focus();return;}
        if(opts.validate&&val){const e=opts.validate(val);if(e){await botSay(e,true);inpEl().focus();return;}}
        choicesEl().classList.add('hidden');inpEl().rows=1;
        userSay(val||'—');resolver=null;inputLive=false;resolve(val||'');
      };
      inputLive=true;
    }
  });
}
function send(){
  const val=inpEl().value.trim();inpEl().value='';
  if(inputLive&&resolver)resolver(val);
}
function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey&&inpEl().rows===1){e.preventDefault();send();}
}

   LANGUAGE FLOW  (fix #6)
══════════════════════════════════════════════ */
async function askLanguages(){
  const lvls=s().langLevels;
  // Map a chosen level (in any UI language) back to its English label for output
  const enLvl=l=>{const i=lvls.indexOf(l);return i>=0?T.en.langLevels[i]:l;};
  const result=[];

  // Arabic
  await botSay(s().q_ar);
  const hasAr=await ask({choices:s().yesNo});
  if(hasAr===s().yesNo[0]){
    await botSay(s().q_ar_lvl);
    const lvl=await ask({choices:lvls});
    result.push(`Arabic – ${enLvl(lvl)}`);
  }

  // English
  await botSay(s().q_en);
  const hasEn=await ask({choices:s().yesNo});
  if(hasEn===s().yesNo[0]){
    await botSay(s().q_en_lvl);
    const lvl=await ask({choices:lvls});
    result.push(`English – ${enLvl(lvl)}`);
  }

  // Other languages (loop)
  let more=true;
  while(more){
    await botSay(s().q_other);
    const ans=await ask({choices:[s().addLang,s().doneLang]});
    if(ans===s().doneLang){more=false;}
    else{
      await botSay(s().q_lang_name);
      const lname=await ask();
      await botSay(s().q_lang_lvl(tCase(lname)));
      const lvl=await ask({choices:lvls});
      const enName=tCase(await translateToEn(lname));
      result.push(`${enName} – ${enLvl(lvl)}`);
    }
  }

  return result.join(',  ');
}

async function run(){

  await botSay(s().chooseStart);
  const start=await ask({choices:[s().optUpload,s().optScratch]});

  await scratchFlow();

async function scratchFlow(){
  cv._fromUpload=false;
  setProgress(5);  await botSay(s().q_name);  cv.name=await ask();
  setProgress(10); await botSay(s().q_title); cv.title=await ask();
  setProgress(15); await botSay(s().q_city);  cv.city=await ask();
  cv.city=await translateToEn(cv.city);          // translate now so country code can be detected
  cv.countryCode=detectCode(cv.city);

  // Relocation — ask, and if yes ask where
  await botSay(s().q_relocate);
  const reloc=await ask({choices:s().yesNo});
  if(reloc===s().yesNo[0]){
    cv.relocate=true;
    await botSay(s().q_relocate_where);
    cv.relocateWhere=await ask();
  } else {
    cv.relocate=false;cv.relocateWhere='';
  }

  // Email — optional (fix #2)
  setProgress(20); await botSay(s().q_email);
  cv.email=await ask({optional:true,validate:v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)?'':s().err_email});

  // Phone with country code hint (fix #5)
  setProgress(25); await botSay(s().q_phone(cv.countryCode));
  cv.phone=await ask();

  setProgress(30); await botSay(s().q_linkedin); cv.linkedin=await ask({optional:true});

  setProgress(35); await botSay(s().q_yrs);
  cv.yearsExp=await ask({choices:s().yrs});

  let jobCount=0,addMore=true;
  while(addMore&&jobCount<3){
    jobCount++;setProgress(35+jobCount*7);
    await botSay(s().q_jco(jobCount)); const jco=await ask();
    await botSay(s().q_jtl);          const jtl=await ask();
    await botSay(s().q_jfr);          const jfr=await ask();
    await botSay(s().q_jto);          const jto=await ask();
    await botSay(s().q_jdu);
    const raw=await ask({multiline:true});
    const duties=raw.split(/\n|,/).map(d=>d.trim()).filter(Boolean);
    cv.jobs.push({company:jco,title:jtl,from:jfr,to:jto,duties});
    if(jobCount<3){await botSay(s().q_more);const ans=await ask({choices:[s().yes,s().no]});addMore=(ans===s().yes);}
    else addMore=false;
  }

  // Education — new options + skip field if ≤ High School  (fix #3 & #4)
  setProgress(62); await botSay(s().q_edu);
  cv.eduLevel=await ask({choices:s().edu});

  const skipField=s().eduSkipField.has(cv.eduLevel);
  if(!skipField){
    setProgress(66); await botSay(s().q_fld); cv.eduField=await ask();
  } else {
    cv.eduField='';
  }
  setProgress(70); await botSay(s().q_ins); cv.eduInst=await ask();
  setProgress(74); await botSay(s().q_yr);
  cv.eduYear=await ask({validate:v=>/^\d{4}$/.test(v)?'':s().err_year});

  setProgress(80); await botSay(s().q_ski); cv.skills=await ask();

  // Language buttons (fix #6)
  setProgress(87); cv.langs=await askLanguages();

  setProgress(95);inputRow().classList.add('hidden');await botSay(s().q_gen);
  await botSay(s().consentMsg);
  await botSay(s().privacyNote(PRIVACY_EMAIL));
  choicesEl().innerHTML='';choicesEl().classList.remove('hidden');

  // Optional consent checkbox — storage happens only if ticked
  const cLabel=document.createElement('label');
  cLabel.style.cssText='display:flex;align-items:center;gap:9px;font-size:12.5px;color:#075E54;background:white;border:1.5px solid #25D366;border-radius:14px;padding:9px 14px;cursor:pointer;max-width:92%;line-height:1.4;';
  const cBox=document.createElement('input');
  cBox.type='checkbox';cBox.style.cssText='width:18px;height:18px;flex-shrink:0;accent-color:#075E54;cursor:pointer;';
  const cText=document.createElement('span');cText.innerHTML=fmt(s().consentLabel);
  cLabel.appendChild(cBox);cLabel.appendChild(cText);
  choicesEl().appendChild(cLabel);

  const genBtn=document.createElement('button');genBtn.className='choice-btn primary';genBtn.textContent=s().genBtn;
  genBtn.onclick=async()=>{
    if(!cBox.checked){await botSay(s().consentRequired,true);return;}  // consent is mandatory
    cv.consent=true;
    choicesEl().classList.add('hidden');userSay(s().genBtn);
    const loader=showLoader(s().translating);
    try{await translateCV();}finally{loader.remove();}   // save to DB happens on download
    showCV();
  };
  choicesEl().appendChild(genBtn);
}

// Builds the enhanced, English, structured CV data shared by the on-screen
// HTML preview (cvHTML) and the PDF generator (buildCvDoc). Output is ALWAYS
// English / LTR regardless of input language.
function cvData(){
  const E=T.en;

  const name=tCase(cv.name.trim());
  const title=cleanTitle(cv.title);
  const city=tCase(fixSpell(cv.city.trim()));
  const email=cv.email.trim().toLowerCase();
  const phone=fmtPhone(cv.phone,cv.countryCode);
  const linkedin=cv.linkedin.trim();
  const relocate=cv.relocate?E.relocateNote(cv.relocateWhere?tCase(fixSpell(cv.relocateWhere.trim())):''):'';

  const skills=cv.skills.split(',').map(x=>x.trim()).filter(Boolean).map(enhanceSkill);

  const jobs=cv.jobs.map(j=>({
    company:cleanCompany(j.company),
    title:cleanTitle(j.title),
    from:tCase(j.from.trim()),
    to:tCase(fixSpell(j.to.trim())),
    duties:j.duties.map(d=>enhanceDuty(d,cv._fromUpload)).filter(Boolean),
  }));

  // Education — don't show field if it's same/redundant as level
  const eduIdx=s().edu.indexOf(cv.eduLevel);
  const eduLevel=tCase(eduIdx>=0?E.edu[eduIdx]:cv.eduLevel);
  const eduField=cv.eduField?fixAcr(tCase(fixSpell(cv.eduField.trim()))):'';
  const eduInst=tCase(fixSpell(cv.eduInst.trim()));
  const eduYear=cv.eduYear.trim();
  const showEduField=eduField&&eduField.toLowerCase()!=='high school'&&eduField.toLowerCase()!=='highschool'&&eduField!==cv.eduLevel;

  // Languages → [{name, level}]
  const langs=(cv.langs||'').split(/[,،]/).map(x=>x.trim()).filter(Boolean).map(part=>{
    const m=part.split(/\s*[–—-]\s*/);
    let nm=part,lv='';
    if(m.length>=2){nm=m[0].trim();lv=m.slice(1).join(' ').trim();}
    return{name:tCase(nm),level:lv};
  }).filter(l=>l.name);

  // Summary — enhance an uploaded profile, else generate a polished one
  const yrsIdx=s().yrs.indexOf(cv.yearsExp);
  const yrsEn=yrsIdx>=0?E.yrs[yrsIdx]:cv.yearsExp;
  const ownSummary=(cv.summary||'').trim();
  const enhanced=(cv._fromUpload&&ownSummary.length>=40)?enhanceSummary(ownSummary,skills):null;
  const summary=enhanced||E.sumTpl(title,yrsEn,jobs.length?jobs[0].company:'',skills);

  return {name,title,city,email,phone,linkedin,relocate,skills,jobs,
    edu:{level:eduLevel,field:eduField,inst:eduInst,year:eduYear,showField:showEduField},
    langs,summary,
    labels:{sum:E.secSum,exp:E.secExp,edu:E.secEdu,ski:E.secSki,lng:E.secLng}};
}

      <div style="font-weight:bold;font-size:13.5px;color:${DARK};">${j.title}</div>
      ${j.company?`<div style="font-size:12.5px;color:${BLUE};font-weight:bold;margin-top:1px;">${j.company}</div>`:''}
      ${dates?`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:${MUTED};margin:3px 0 5px;"><span style="color:${BLUE};display:inline-flex;">${icon(I_CAL,12)}</span>${dates}</div>`:''}
      ${bullets?`<ul style="padding-left:17px;margin:0;font-size:12px;color:${BODY};line-height:1.55;">${bullets}</ul>`:''}
    </div>`;
  }).join('');

  const skillTags=skills.map(sk=>`<span style="background:#EFF4FE;border:1px solid #BFD4F5;color:#1E40AF;padding:4px 10px;border-radius:13px;font-size:11px;margin:0 5px 6px 0;display:inline-block;">${sk}</span>`).join('');

  /* ── Languages → name + proficiency dots ── */
  const langDotCount=t=>{
    t=(t||'').toLowerCase();
    if(/native|mother|fluent|طليق|طلاقة|اللغة الأم/.test(t))return 5;
    if(/advanced|proficient|upper/.test(t))return 4;
    if(/basic|beginn|element|limited|fair|مبتدئ/.test(t))return 2;
    return 3; // intermediate / good / working / default
  };
  const langHTML=langList.map(l=>{
    const n=langDotCount(l.level);
    let dots='';
    for(let i=0;i<5;i++)dots+=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${i<n?BLUE:'#D9DEE8'};margin-left:3px;"></span>`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
      <div><div style="font-size:12px;font-weight:bold;color:${DARK};">${l.name}</div>${l.level?`<div style="font-size:10.5px;color:${MUTED};">${l.level}</div>`:''}</div>
      <div style="white-space:nowrap;display:flex;">${dots}</div>
    </div>`;
  }).join('');

  const eduHTML=`<div>
    <div style="font-weight:bold;font-size:13px;color:${DARK};">${eduLevel}${showEduField?' – '+eduField:''}</div>
    <div style="font-size:11.5px;color:${MUTED};margin-top:2px;">${eduInst}${eduYear?'  ·  '+eduYear:''}</div>
  </div>`;

  /* ── Two columns: Experience+Education (main) | Summary+Skills+Languages (sidebar) ── */
  const mainCol=`${jobs.length?sec(E.secExp)+jobsHTML:''}${sec(E.secEdu)+eduHTML}`;
  const sideCol=`${sec(E.secSum)}<p style="font-size:11.5px;color:${BODY};line-height:1.6;margin:0;">${summary}</p>`+
    `${skills.length?`<div style="margin-top:20px;">${sec(E.secSki)}<div>${skillTags}</div></div>`:''}`+
    `${langHTML?`<div style="margin-top:20px;">${sec(E.secLng)}${langHTML}</div>`:''}`;

  return `<div style="font-family:'Inter','Segoe UI',Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;direction:ltr;text-align:left;color:${DARK};padding:38px 44px;line-height:1.55;background:white;">
    <div style="font-size:30px;font-weight:800;color:${DARK};letter-spacing:.5px;margin-bottom:3px;">${name}</div>
    ${title?`<div style="font-size:14.5px;color:${BLUE};font-weight:bold;margin-bottom:9px;">${title}</div>`:''}
    <div style="display:flex;flex-wrap:wrap;gap:4px 14px;align-items:center;font-size:11px;padding-bottom:12px;border-bottom:2px solid ${BLUE};">${contacts}</div>
    ${relocate?`<div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${BLUE};font-weight:bold;margin-top:10px;"><span style="display:inline-flex;">${icon(I_PLANE,13)}</span>${relocate}</div>`:''}
    <div style="display:flex;gap:32px;margin-top:20px;align-items:flex-start;">
      <div style="flex:1.7;min-width:0;">${mainCol}</div>
      <div style="flex:1;min-width:0;">${sideCol}</div>
    </div>
  </div>`;
}

// pdfmake — lazy-loaded only when the user saves (same pattern as pdf.js upload)
const PDFMAKE_JS='https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.12/pdfmake.min.js';
const PDFMAKE_FONTS='https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.12/vfs_fonts.js';

// Build a real, text-based (selectable / ATS-readable) pdfmake document from the
// shared CV data. Single-column layout — the most ATS-safe structure.
function buildCvDoc(d){
  const BLUE='#2563EB', DARK='#111827', MUTED='#6B7280', BODY='#374151';
  const W=515; // A4 content width at 40pt margins (595 − 40 − 40)
  const rule=(c,lw)=>({canvas:[{type:'line',x1:0,y1:0,x2:W,y2:0,lineWidth:lw||1,lineColor:c||BLUE}]});
  const sectionHeader=label=>[
    {text:(label||'').toUpperCase(),bold:true,fontSize:11,color:DARK,characterSpacing:1,margin:[0,14,0,3]},
    {...rule(BLUE,1),margin:[0,0,0,7]}
  ];
  const L=d.labels;
  const c=[];

  // ── Header ──
  c.push({text:d.name,bold:true,fontSize:24,color:DARK,margin:[0,0,0,2]});
  if(d.title)c.push({text:d.title,bold:true,fontSize:12,color:BLUE,margin:[0,0,0,5]});
  const contacts=[d.phone,d.email,d.city,d.linkedin].filter(Boolean).join('   ·   ');
  if(contacts)c.push({text:contacts,fontSize:9,color:BODY,margin:[0,0,0,6]});
  c.push(rule(BLUE,1.5));
  if(d.relocate)c.push({text:d.relocate,bold:true,fontSize:9,color:BLUE,margin:[0,7,0,0]});

  // ── Professional Summary ──
  c.push(...sectionHeader(L.sum));
  c.push({text:d.summary,fontSize:10,color:BODY,lineHeight:1.3});

  // ── Work Experience ──
  if(d.jobs.length){
    c.push(...sectionHeader(L.exp));
    d.jobs.forEach(j=>{
      c.push({text:j.title,bold:true,fontSize:11,color:DARK,margin:[0,5,0,0]});
      if(j.company)c.push({text:j.company,bold:true,fontSize:10,color:BLUE,margin:[0,1,0,0]});
      const dates=[j.from,j.to].filter(Boolean).join(' – ');
      if(dates)c.push({text:dates,fontSize:9,color:MUTED,margin:[0,1,0,3]});
      if(j.duties.length)c.push({ul:j.duties.slice(),fontSize:10,color:BODY,lineHeight:1.3,margin:[0,0,0,4]});
    });
  }

  // ── Skills ──
  if(d.skills.length){
    c.push(...sectionHeader(L.ski));
    c.push({text:d.skills.join(',   '),fontSize:10,color:BODY,lineHeight:1.35});
  }

  // ── Education ──
  c.push(...sectionHeader(L.edu));
  c.push({text:d.edu.level+(d.edu.showField?' – '+d.edu.field:''),bold:true,fontSize:10.5,color:DARK});
  const eduSub=[d.edu.inst,d.edu.year].filter(Boolean).join('  ·  ');
  if(eduSub)c.push({text:eduSub,fontSize:9.5,color:MUTED,margin:[0,1,0,0]});

  // ── Languages ──
  if(d.langs.length){
    c.push(...sectionHeader(L.lng));
    d.langs.forEach(l=>c.push({
      text:[{text:l.name,bold:true},l.level?{text:'  —  '+l.level,color:MUTED}:''],
      fontSize:10,color:DARK,margin:[0,1,0,0]
    }));
  }

  return {
    pageSize:'A4',
    pageMargins:[40,40,40,40],
    defaultStyle:{font:'Roboto',fontSize:10,color:BODY,lineHeight:1.25},
    info:{title:pdfFilename(cv.name)},
    content:c
  };
}

// Generate and download a real PDF directly — no browser print dialog.
async function savePDF(){
  const st=s();

    await loadScript(PDFMAKE_JS);

    pdfMake.createPdf(buildCvDoc(cvData())).download(pdfFilename(cv.name)+'.pdf');
    // Persist only when the user downloads the final version (consent required)
    if(cv.consent&&!cv._saved){cv._saved=true;saveSubmission();}
  }catch(e){
    botSay(st.saveErr,true);
  }finally{
    loader.remove();
  }
}

// Lazy-load external libraries only when the upload feature is used
const _scriptCache={};
function loadScript(src){
  if(_scriptCache[src])return _scriptCache[src];
  _scriptCache[src]=new Promise((res,rej)=>{
    const el=document.createElement('script');el.src=src;
    el.onload=res;el.onerror=()=>rej(new Error('Failed to load '+src));
    document.head.appendChild(el);
  });
  return _scriptCache[src];
}

// PDF → text (pdf.js). Reconstructs lines using the y-coordinate of each text item.
async function extractPDF(file){
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let out='';
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    let lastY=null,line='';const lines=[];
    for(const it of tc.items){
      const y=it.transform[5];
      if(lastY!==null&&Math.abs(y-lastY)>3){lines.push(line.trim());line='';}
      line+=(line&&!line.endsWith(' ')?' ':'')+it.str;
      lastY=y;
    }
    if(line.trim())lines.push(line.trim());
    out+=lines.join('\n')+'\n';
  }
  return out;
}

// Image → text (Tesseract.js OCR, English + Arabic)

}

// Best-effort parse of raw CV text into the cv structure
function parseCV(text){
  const clean=text.replace(/\r/g,'').replace(/ /g,' ');
  const lines=clean.split('\n').map(l=>l.trim()).filter(Boolean);
  cv.email=(clean.match(/[\w.+-]+@[\w-]+\.[\w.-]+/)||[''])[0];
  const ph=clean.match(/\+?\d[\d\s().\-]{7,}\d/);cv.phone=ph?ph[0].trim():'';
  const li=clean.match(/(?:https?:\/\/)?(?:www\.)?linkedin\.com\/[^\s]+/i);cv.linkedin=li?li[0]:'';
  cv.name=guessName(lines);
  const sec=sliceSections(lines);
  if(sec.skills.length)cv.skills=sec.skills.join(', ').replace(/[•\-\*▪◦·]/g,' ').replace(/[,;]+/g,',').replace(/\s{2,}/g,' ').replace(/,\s*,/g,',').replace(/^,|,$/g,'').trim();
  if(sec.languages.length)cv.langs=sec.languages.join(', ').replace(/[•\-\*▪◦·]/g,'').replace(/\s{2,}/g,' ').trim();
  if(sec.education.length)parseEdu(sec.education);
  if(sec.experience.length)cv.jobs=extractJobs(sec.experience);
  if(sec.summary.length){
    const sm=sec.summary.join(' ').replace(/[•\-\*▪◦·‣]/g,' ').replace(/\s{2,}/g,' ').trim();
    if(sm.length>=40)cv.summary=sm;          // keep the candidate's real profile text
  }
  cv.city=guessCity(clean);
  if(!cv.title)cv.title=(cv.jobs[0]&&cv.jobs[0].title)||guessTitle(lines,cv.name)||'';
}

// A header is a SHORT, STANDALONE label (e.g. "EMPLOYMENT HISTORY"), matched on
// the WHOLE line — never a keyword that merely appears inside a sentence. This
// prevents wrapped duty lines like "vision of the project" from being mistaken
// for a "Projects" heading and prematurely ending a section.
function headerKind(line){
  const t=(line||'').trim();
  if(/[.!?]$/.test(t))return undefined;               // sentences/wrapped tails (e.g. "community.") are never headers
  const norm=t.replace(/&/g,' and ').replace(/[^A-Za-z\s]/g,' ').replace(/\s+/g,' ').trim().toLowerCase();
  if(!norm||norm.length>34)return undefined;          // headings are short labels
  if(/^(work experience|professional experience|experience|employment(?: history)?|work history|career(?: history| summary)?)$/.test(norm))return'experience';
  if(/^(education(?:al)?(?: background)?|education and training|academic(?: background)?|academic qualifications?|qualifications?)$/.test(norm))return'education';
  if(/^((?:key |core |technical |professional )?skills|core competenc(?:e|ies|y)|competenc(?:e|ies|y)|expertise|areas of expertise)$/.test(norm))return'skills';
  if(/^(languages?|language skills)$/.test(norm))return'languages';
  if(/^(professional summary|career summary|summary|professional profile|personal profile|profile|career objective|objective|about(?: me)?)$/.test(norm))return'summary';
  // recognized-but-irrelevant → ends the current section (content discarded).
  // Bare ambiguous words (community/details/contact/interests/activities) are
  // intentionally excluded — they appear too often as wrapped sentence tails.
  if(/^(social work|volunteer(?:ing| work| experience)?|community service|certificat(?:e|es|ions?)|certifications and licen[cs]es|licen[cs]es?|trainings?|courses?|awards?(?: and honou?rs)?|honou?rs|achievements?|accomplishments?|references|interests and hobbies|hobbies|extracurricular activities|memberships?|affiliations?|publications?|projects?|personal projects|portfolio|personal (?:details|information|info)|contact (?:details|information)|declaration)$/.test(norm))return'other';
  return undefined;
}
function isHeader(line){return headerKind(line)!==undefined;}
function sectionOf(line){const k=headerKind(line);return(k&&k!=='other')?k:null;}
function sliceSections(lines){
  const out={experience:[],education:[],skills:[],languages:[],summary:[]};
  let cur=null;
  for(const ln of lines){
    if(isHeader(ln)){const sct=sectionOf(ln);cur=out[sct]?sct:null;continue;}
    if(cur)out[cur].push(ln);
  }
  return out;
}

function guessName(lines){
  const re=/^[A-Za-z؀-ۿ][A-Za-z؀-ۿ.'\-]*(?:\s+[A-Za-z؀-ۿ.'\-]+){1,3}$/;
  for(const ln of lines.slice(0,6)){
    if(ln.length>40||/\d|@/.test(ln)||isHeader(ln))continue;
    if(/curriculum vitae|resume|سيرة ذاتية/i.test(ln))continue;
    if(re.test(ln))return ln;
  }
  return'';
}
function guessTitle(lines,name){
  const i=lines.indexOf(name);
  if(i>=0&&lines[i+1]){const t=lines[i+1];if(t.length<48&&!/\d|@|linkedin/i.test(t)&&!isHeader(t))return t;}
  return'';
}
function guessCity(clean){
  const low=clean.toLowerCase();
  for(const city of Object.keys(CITY_CODES)){
    if(new RegExp('\\b'+city.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(low))return tCase(city);
  }
  return'';
}

// Robust job extractor. Handles the most common real-world layouts:
//   "Job Title at Company, City"      (header line)
//   "March 2023 — Present"            (date range on its OWN line)
//   "• bullet"  "• bullet"            (duties)
// …as well as headers where the date is on the same line, em/en-dash ranges,
// month-name ranges, and "Present/Current".
function extractJobs(lines){
  const jobs=[];
  const MONTHS='jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec';
  const presentRe=/present|current|ongoing|now|حتى الآن|till date|to date/i;
  const monthYear=new RegExp('((?:'+MONTHS+')[a-z]*\\.?\\s*)?((?:19|20)\\d{2})','i');
  const yearRe=/\b(19|20)\d{2}\b/;
  const isBullet=l=>/^[•\*▪◦·‣]\s?|^[-–—]\s+/.test(l);
  // A genuine date / date-range line: either a real "X – Y" range, or a line
  // that is essentially nothing but a single date token. NOT a prose line that
  // merely happens to contain a year.
  const RANGE_RE=/(present|current|(?:19|20)\d{2})\s*(?:–|—|-|to|till|until)\s*(present|current|(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?\s*(?:19|20)?\d{0,4}|(?:19|20)\d{2})/i;
  const SINGLE_RE=/^\s*(?:(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?\s*)?(?:19|20)\d{2}\s*(?:–|—|-)?\s*(?:present|current)?\s*$/i;
  function isDateLine(l){
    if(l.length>46)return false;
    return RANGE_RE.test(l)||SINGLE_RE.test(l);
  }
  function rangeDates(l){
    const pick=seg=>{if(presentRe.test(seg))return'Present';const m=seg.match(monthYear);return m?m[0].replace(/\s+/g,' ').trim():'';};
    const parts=l.split(/\s*(?:–|—|-|to|until|till)\s*/i).map(x=>x.trim()).filter(Boolean);
    if(parts.length>=2)return{from:pick(parts[0]),to:pick(parts[parts.length-1])};
    const all=l.match(new RegExp(monthYear.source,'ig'))||[];
    return{from:all[0]?all[0].trim():'',to:presentRe.test(l)?'Present':(all[1]?all[1].trim():'')};
  }
  function parseHeader(text){
    text=(text||'').replace(/^[•\-\*▪◦·‣\s]+/,'').replace(/\s{2,}/g,' ').trim();
    if(!text)return{title:'',company:''};
    let title='',company='';
    const at=text.split(/\s+(?:at|@|،|\|)\s+/i);
    if(at.length>=2){title=at[0];company=at.slice(1).join(' ');}
    else{const c=text.split(/\s*[,\-–—|]\s*/);title=c[0]||text;company=c[1]||'';}
    company=company.replace(/\s*,\s*[^,]+$/,'').trim();   // drop trailing ", City"
    title=title.replace(/^[,\-–—\s]+|[,\-–—\s]+$/g,'').trim();
    return{title,company};
  }
  function headerFromDateLine(l){
    return parseHeader(l.replace(new RegExp(yearRe.source,'g'),' ')
      .replace(new RegExp('\\b('+MONTHS+')[a-z]*\\.?','ig'),' ')
      .replace(new RegExp(presentRe.source,'ig'),' ')
      .replace(/[–—\-]+/g,' ').replace(/\s+/g,' ').trim());
  }

  // Buffer of consecutive non-bullet prose lines. When a date line arrives, the
  // LAST buffered line is the job header and the earlier ones are wrapped tails
  // of the previous bullet; a bullet flushes the whole buffer into the prior bullet.
  let cur=null,buf=[];
  const push=()=>{if(cur&&(cur.title||cur.company||cur.duties.length))jobs.push(cur);};
  const appendCont=arr=>{if(cur&&cur.duties.length&&arr.length)cur.duties[cur.duties.length-1]=(cur.duties[cur.duties.length-1]+' '+arr.join(' ')).replace(/\s+/g,' ').trim();};

  for(const raw of lines){
    const ln=raw.trim();if(!ln)continue;
    if(!isBullet(ln)&&isDateLine(ln)){
      // —— date line → new job boundary ——
      const inlineHeader=headerFromDateLine(ln);
      let headerText='';
      if(inlineHeader.title||inlineHeader.company){appendCont(buf);}        // header shared on the date line
      else if(buf.length){headerText=buf[buf.length-1];appendCont(buf.slice(0,-1));}
      buf=[];
      push();
      const{from,to}=rangeDates(ln);
      cur={company:'',title:'',from,to,duties:[]};
      const h=(inlineHeader.title||inlineHeader.company)?inlineHeader:parseHeader(headerText);
      cur.title=h.title;cur.company=h.company;
    }else if(isBullet(ln)){
      appendCont(buf);buf=[];                                               // buffered prose was a wrapped tail
      const txt=ln.replace(/^[•\-\*▪◦·‣\s]+/,'').trim();
      if(cur&&txt)cur.duties.push(txt);
    }else{
      buf.push(ln);                                                         // prose: header or wrapped tail (resolved later)
    }
  }
  appendCont(buf);
  push();
  return jobs.slice(0,8);
}

function parseEdu(lines){
  const levelRe=/(ph\.?\s?d|doctorate|master'?s?|m\.?sc|m\.?a\b|mba|bachelor'?s?|b\.?sc|b\.?a\b|diploma|associate|baccalaureate|high\s*school|secondary|primary)/i;
  const joined=lines.join(' ');
  cv.eduYear=(joined.match(/\b(19|20)\d{2}\b/)||[''])[0];
  const lvlLine=lines.find(l=>levelRe.test(l));
  cv.eduLevel=lvlLine?lvlLine.match(levelRe)[0].replace(/\s{2,}/g,' ').trim():(lines[0]||'');
  const instLine=lines.find(l=>/university|college|institute|school|academy|polytechnic|جامعة|كلية|معهد/i.test(l));
  cv.eduInst=instLine?instLine.replace(/\b(19|20)\d{2}\b/g,'').replace(/[|]/g,' ').replace(/\s{2,}/g,' ').trim():'';
  if(lvlLine){
    cv.eduField=lvlLine.replace(levelRe,'').replace(/\b(19|20)\d{2}\b/g,'').replace(/\b(in|of|degree)\b/gi,'').replace(/[|,–—\-]+/g,' ').replace(/\s{2,}/g,' ').trim();
  }
}

async function finalizeUpload(){
  if(!cv.yearsExp)cv.yearsExp='several years';
  setProgress(95);
  await botSay(s().draftReady);
  await botSay(s().consentMsg);
  await botSay(s().privacyNote(PRIVACY_EMAIL));
  choicesEl().innerHTML='';choicesEl().classList.remove('hidden');inputRow().classList.add('hidden');

  const cLabel=document.createElement('label');
  cLabel.style.cssText='display:flex;align-items:center;gap:9px;font-size:12.5px;color:#075E54;background:white;border:1.5px solid #25D366;border-radius:14px;padding:9px 14px;cursor:pointer;max-width:92%;line-height:1.4;';
  const cBox=document.createElement('input');
  cBox.type='checkbox';cBox.style.cssText='width:18px;height:18px;flex-shrink:0;accent-color:#075E54;cursor:pointer;';
  const cText=document.createElement('span');cText.innerHTML=fmt(s().consentLabel);
  cLabel.appendChild(cBox);cLabel.appendChild(cText);choicesEl().appendChild(cLabel);

  const go=document.createElement('button');go.className='choice-btn primary';go.textContent=s().viewDraft;
  go.onclick=()=>{
    if(!cBox.checked){botSay(s().consentRequired,true);return;}
    cv.consent=true;choicesEl().classList.add('hidden');userSay(s().viewDraft);
    setProgress(100);showCV();
  };
  choicesEl().appendChild(go);
}

   EDIT FORM  (review & correct any field, then re-render)

function efField(id,label,val,opts={}){
  const w=document.createElement('div');w.className='ef-field';
  if(label){const l=document.createElement('label');l.textContent=label;w.appendChild(l);}
  const el=document.createElement(opts.area?'textarea':'input');
  if(opts.cls)el.className=opts.cls;else el.id=id;
  el.value=val||'';if(opts.ph)el.placeholder=opts.ph;
  w.appendChild(el);return w;
}
function efGroup(title,fields){
  const g=document.createElement('div');g.className='ef-group';
  const h=document.createElement('h4');h.textContent=title;g.appendChild(h);
  fields.forEach(f=>g.appendChild(f));return g;
}
function efJobCard(job){
  const st=s();
  const card=document.createElement('div');card.className='ef-job';
  const rm=document.createElement('button');rm.type='button';rm.className='rm';rm.textContent=st.efRemove;
  rm.onclick=()=>card.remove();card.appendChild(rm);
  card.appendChild(efField('',st.efJobTitle,job.title,{cls:'j-title'}));
  card.appendChild(efField('',st.efCompany,job.company,{cls:'j-company'}));
  const row=document.createElement('div');row.className='ef-row';
  row.appendChild(efField('',st.efFrom,job.from,{cls:'j-from'}));
  row.appendChild(efField('',st.efTo,job.to,{cls:'j-to'}));
  card.appendChild(row);
  card.appendChild(efField('',st.efDuties,(job.duties||[]).join('\n'),{cls:'j-duties',area:true}));
  return card;
}
function openEditForm(){
  const st=s();
  document.getElementById('edit-title').textContent=st.editTitle;
  document.getElementById('edit-cancel').textContent=st.editCancel;
  const ap=document.getElementById('edit-apply');ap.textContent=st.editApply;ap.disabled=false;
  const body=document.getElementById('edit-body');body.innerHTML='';

  body.appendChild(efGroup(st.efContact,[
    efField('ef-name',st.efName,cv.name),
    efField('ef-title',st.efJobTitle,cv.title),
    efField('ef-city',st.efCity,cv.city),
    efField('ef-email',st.efEmail,cv.email),
    efField('ef-phone',st.efPhone,cv.phone),
    efField('ef-linkedin',st.efLinkedin,cv.linkedin),
  ]));

  const expG=efGroup(st.efExp,[efField('ef-years',st.efYears,cv.yearsExp)]);
  const jobsWrap=document.createElement('div');jobsWrap.id='ef-jobs';
  (cv.jobs.length?cv.jobs:[{company:'',title:'',from:'',to:'',duties:[]}]).forEach(j=>jobsWrap.appendChild(efJobCard(j)));
  expG.appendChild(jobsWrap);
  const add=document.createElement('button');add.type='button';add.className='ef-add';add.textContent=st.efAddJob;
  add.onclick=()=>{if(jobsWrap.children.length<3)jobsWrap.appendChild(efJobCard({company:'',title:'',from:'',to:'',duties:[]}));};
  expG.appendChild(add);body.appendChild(expG);

  body.appendChild(efGroup(st.efEducation,[
    efField('ef-level',st.efLevel,cv.eduLevel),
    efField('ef-field',st.efField,cv.eduField),
    efField('ef-inst',st.efInst,cv.eduInst),
    efField('ef-year',st.efYear,cv.eduYear),
  ]));
  body.appendChild(efGroup(st.efSkills,[efField('ef-skills','',cv.skills,{area:true})]));
  body.appendChild(efGroup(st.efLangs,[efField('ef-langs','',cv.langs)]));

  document.getElementById('edit-overlay').classList.add('open');
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');}
async function applyEdit(){
  const v=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  cv.name=v('ef-name');cv.title=v('ef-title');cv.city=v('ef-city');
  cv.email=v('ef-email');cv.phone=v('ef-phone');cv.linkedin=v('ef-linkedin');
  cv.yearsExp=v('ef-years')||'several years';
  cv.jobs=[...document.querySelectorAll('#ef-jobs .ef-job')].map(card=>{
    const g=cls=>{const e=card.querySelector('.'+cls);return e?e.value.trim():'';};
    return{company:g('j-company'),title:g('j-title'),from:g('j-from'),to:g('j-to'),
      duties:g('j-duties').split('\n').map(d=>d.trim()).filter(Boolean)};
  }).filter(j=>j.title||j.company||j.duties.length);
  cv.eduLevel=v('ef-level');cv.eduField=v('ef-field');cv.eduInst=v('ef-inst');cv.eduYear=v('ef-year');
  cv.skills=v('ef-skills');cv.langs=v('ef-langs');
  cv.countryCode=detectCode(cv.city)||cv.countryCode;

  const ap=document.getElementById('edit-apply');ap.disabled=true;ap.textContent='…';
  await translateCV();cv.langs=await translateToEn(cv.langs);cv.eduLevel=await translateToEn(cv.eduLevel);
  closeEdit();showCV();
}

window.onload=()=>{
  document.getElementById('cv-file').onchange=e=>{const f=e.target.files&&e.target.files[0];e.target.value='';if(f)handleFile(f);};
  run();
};
